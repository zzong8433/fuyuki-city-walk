<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Arena — Showdown (prototype)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0a14; }
  body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', system-ui, sans-serif; color: #f0e8dc; cursor: crosshair; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  /* DOM overlay for nameplates + floating damage numbers */
  #overlay { position: fixed; inset: 0; pointer-events: none; z-index: 4; overflow: hidden; }
  .bar { position: absolute; transform: translate(-50%, -50%); }
  .hpwrap { width: 46px; height: 6px; background: rgba(0,0,0,0.55); border: 1px solid rgba(0,0,0,0.6); border-radius: 3px; overflow: hidden; }
  .hpfill { height: 100%; width: 100%; background: linear-gradient(90deg,#5fe06a,#37c24a); transition: width 0.08s linear; }
  .hpfill.enemy { background: linear-gradient(90deg,#ff6b5f,#e0392c); }
  .nplabel { position: absolute; transform: translate(-50%, -100%); font-size: 11px; font-weight: 600; text-shadow: 0 1px 2px #000; white-space: nowrap; }
  .dmg { position: absolute; transform: translate(-50%,-50%); font-weight: 800; font-size: 16px; text-shadow: 0 2px 3px #000; }

  /* HUD */
  #hud { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
  #vignette { position: fixed; inset: 0; pointer-events: none; z-index: 3;
    box-shadow: inset 0 0 220px rgba(120,10,10,0); transition: box-shadow 0.25s; }

  #topbar { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); text-align: center; }
  #alive { font-size: 26px; font-weight: 800; letter-spacing: 1px; text-shadow: 0 2px 6px #000; }
  #alive small { font-size: 14px; font-weight: 400; color: #c9bda8; letter-spacing: 2px; }
  #stormtxt { font-size: 12px; color: #ad8bff; margin-top: 2px; letter-spacing: 1px; }

  #feed { position: absolute; top: 12px; right: 16px; width: 260px; text-align: right; }
  .feedrow { font-size: 13px; margin-bottom: 3px; opacity: 0; animation: feedin 0.2s forwards; text-shadow: 0 1px 3px #000; }
  .feedrow b { color: #ffd27a; }
  @keyframes feedin { from { opacity:0; transform: translateX(12px);} to {opacity:1; transform:none;} }

  /* minimap */
  #minimap { position: absolute; top: 64px; right: 16px; width: 132px; height: 132px;
    border: 2px solid rgba(255,255,255,0.18); border-radius: 8px; background: rgba(10,8,18,0.55); }

  /* bottom-left player panel */
  #panel { position: absolute; left: 22px; bottom: 22px; }
  #hpbig { width: 240px; height: 22px; background: rgba(0,0,0,0.5); border: 1px solid rgba(0,0,0,0.6); border-radius: 6px; overflow: hidden; position: relative; }
  #hpbigfill { height: 100%; width: 100%; background: linear-gradient(90deg,#5fe06a,#37c24a); transition: width 0.1s; }
  #hpbigtxt { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; text-shadow: 0 1px 2px #000; }
  #ammo { display: flex; gap: 5px; margin-top: 8px; }
  .pip { width: 30px; height: 9px; border-radius: 3px; background: #3a3450; border: 1px solid #15101f; }
  .pip.full { background: linear-gradient(90deg,#ffd27a,#ffae3b); box-shadow: 0 0 8px rgba(255,180,60,0.5); }
  #skills { display: flex; gap: 10px; margin-top: 12px; }
  .skill { width: 56px; height: 56px; border-radius: 10px; background: rgba(20,16,30,0.8); border: 1px solid rgba(255,255,255,0.12);
    position: relative; overflow: hidden; display:flex; align-items:center; justify-content:center; }
  .skill .key { position: absolute; top: 3px; left: 5px; font-size: 11px; color: #cdbfff; font-weight: 700; }
  .skill .nm { font-size: 10px; color: #d8ccb6; position:absolute; bottom: 4px; width:100%; text-align:center; }
  .skill .ico { font-size: 22px; }
  .skill .cd { position: absolute; inset: 0; background: rgba(0,0,0,0.66); transform-origin: bottom; transform: scaleY(0); }
  .skill.ult { border-color: #a06bff; }
  #ultwrap { width: 240px; height: 10px; margin-top: 12px; background: rgba(0,0,0,0.5); border-radius: 5px; overflow: hidden; border:1px solid #15101f; }
  #ultfill { height: 100%; width: 0%; background: linear-gradient(90deg,#9b6bff,#d39bff); transition: width 0.12s; }
  #ultwrap.ready { box-shadow: 0 0 14px rgba(180,120,255,0.8); animation: ultpulse 1s infinite; }
  @keyframes ultpulse { 0%,100%{filter:brightness(1);} 50%{filter:brightness(1.5);} }

  /* screens */
  .screen { position: fixed; inset: 0; z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, rgba(30,18,55,0.92), rgba(12,8,20,0.96)); text-align: center; cursor: default; }
  .screen.hidden { display: none; }
  .screen h1 { font-size: 50px; letter-spacing: 8px; font-weight: 800; text-shadow: 0 0 30px rgba(160,100,255,0.6); margin-bottom: 4px; }
  .screen h2 { font-size: 15px; letter-spacing: 5px; color: #b79bff; margin-bottom: 30px; font-weight: 400; }
  .controls { background: rgba(0,0,0,0.35); border: 1px solid rgba(180,150,255,0.22); border-radius: 12px; padding: 20px 30px;
    font-size: 14px; line-height: 2.1; text-align: left; color: #e6dcc8; }
  .controls b { color: #ffd27a; display: inline-block; min-width: 116px; }
  .btn { margin-top: 30px; padding: 14px 44px; font-size: 17px; font-weight: 700; letter-spacing: 3px; color: #1a1026;
    background: linear-gradient(180deg,#ffd27a,#ffae3b); border: none; border-radius: 10px; cursor: pointer; pointer-events: auto;
    box-shadow: 0 6px 20px rgba(255,170,60,0.35); transition: transform 0.1s; }
  .btn:hover { transform: translateY(-2px); }
  #result { font-size: 19px; color: #d8ccb6; margin-bottom: 8px; letter-spacing: 2px; }
  .place { color: #ffd27a; font-weight: 800; }
</style>
</head>
<body>
<div id="app"></div>
<div id="vignette"></div>
<div id="overlay"></div>

<div id="hud">
  <div id="topbar">
    <div id="alive">8 <small>남음</small></div>
    <div id="stormtxt">폭풍 대기 중…</div>
  </div>
  <div id="feed"></div>
  <canvas id="minimap" width="132" height="132"></canvas>

  <div id="panel">
    <div id="hpbig"><div id="hpbigfill"></div><div id="hpbigtxt">100 / 100</div></div>
    <div id="ammo"></div>
    <div id="skills">
      <div class="skill" id="sk-q"><span class="key">Q</span><span class="ico">⟫</span><span class="nm">대시</span><div class="cd"></div></div>
      <div class="skill" id="sk-e"><span class="key">E</span><span class="ico">✸</span><span class="nm">산탄</span><div class="cd"></div></div>
      <div class="skill ult" id="sk-r"><span class="key">R</span><span class="ico">★</span><span class="nm">오버드라이브</span><div class="cd"></div></div>
    </div>
    <div id="ultwrap"><div id="ultfill"></div></div>
  </div>
</div>

<!-- start screen -->
<div class="screen" id="startscreen">
  <h1>CLAUDE ARENA</h1>
  <h2>S H O W D O W N　·　prototype</h2>
  <div class="controls">
    <div><b>이동</b> W A S D</div>
    <div><b>조준</b> 마우스</div>
    <div><b>기본 공격</b> 좌클릭 (꾹 누르면 연사)</div>
    <div><b>Q · 대시</b> 회피 이동 (무적 프레임)</div>
    <div><b>E · 산탄</b> 부채꼴 5연발</div>
    <div><b>R · 오버드라이브</b> 궁극기 (충전 시)</div>
    <div style="margin-top:10px;color:#b79bff">8명 중 최후의 1인이 되세요. 보라색 폭풍 밖은 위험!</div>
  </div>
  <button class="btn" id="startbtn">전투 시작</button>
</div>

<!-- result screen -->
<div class="screen hidden" id="resultscreen">
  <div id="result">결과</div>
  <h1 id="resulttitle">VICTORY</h1>
  <div style="font-size:15px;color:#c9bda8;letter-spacing:2px">처치 <span id="killcount" class="place">0</span>　·　순위 <span id="placecount" class="place">#1</span></div>
  <button class="btn" id="againbtn">다시 하기</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.165.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

// ===========================================================================
// CONFIG
// ===========================================================================
const CFG = {
  worldRadius: 44,          // hard movement bound
  arenaRadius: 40,          // visual floor radius
  unitRadius: 0.9,
  player: { hp: 100, speed: 9.2, regen: 9, regenDelay: 3.5 },
  bot:    { hp: 100, speed: 8.0, count: 7, vision: 27, fireRange: 22, accuracy: 0.86 },
  proj:   { speed: 27, radius: 0.35, life: 1.1, dmg: 22, knock: 3.2 },
  ammo:   { max: 3, reload: 1.35, fireCd: 0.30 },
  dash:   { dist: 8.5, time: 0.16, cd: 5.5, iframe: 0.24 },
  scatter:{ count: 5, spread: 0.42, dmg: 13, cd: 6.5 },
  ult:    { max: 100, perHit: 7, perKill: 22, dur: 4.5, fireMul: 0.5, speedMul: 1.3 },
  storm:  { grace: 11, shrinkTime: 95, minRadius: 6, dps: 9 },
};
const COLORS = { player: 0x57c8ff, bots: [0xff6b5f, 0xffc24a, 0x9b6bff, 0x5fe06a, 0xff8fd0, 0x6be0d0, 0xc0a070] };

// ===========================================================================
// RENDERER / SCENE / CAMERA
// ===========================================================================
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x14101f);
scene.fog = new THREE.Fog(0x14101f, 70, 130);

const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 400);
const CAM_OFF = new THREE.Vector3(0, 34, 24); // quarter-view: high + behind
camera.position.copy(CAM_OFF);
camera.lookAt(0, 0, 0);

// lights
scene.add(new THREE.HemisphereLight(0xbfd4ff, 0x2a2030, 0.85));
const sun = new THREE.DirectionalLight(0xfff0d8, 1.5);
sun.position.set(30, 50, 18);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1; sun.shadow.camera.far = 160;
const sc = 60; Object.assign(sun.shadow.camera, { left: -sc, right: sc, top: sc, bottom: -sc });
sun.shadow.bias = -0.0004;
scene.add(sun);
scene.add(sun.target);

// ===========================================================================
// WORLD GEOMETRY
// ===========================================================================
const ground = new THREE.Mesh(
  new THREE.CircleGeometry(CFG.arenaRadius, 64),
  new THREE.MeshStandardMaterial({ color: 0x3a4a3c, roughness: 0.96, metalness: 0 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// faint ring lines on the floor for depth read
for (let r = 10; r <= CFG.arenaRadius; r += 10) {
  const ring = new THREE.Mesh(
    new THREE.RingGeometry(r - 0.12, r + 0.12, 64),
    new THREE.MeshBasicMaterial({ color: 0x4f6452, transparent: true, opacity: 0.4 })
  );
  ring.rotation.x = -Math.PI / 2; ring.position.y = 0.02; scene.add(ring);
}

// obstacles (cover) — boxes
const obstacles = [];
function addObstacle(x, z, w, d, h) {
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshStandardMaterial({ color: 0x6b5840, roughness: 0.9 })
  );
  m.position.set(x, h / 2, z); m.castShadow = true; m.receiveShadow = true;
  scene.add(m);
  obstacles.push({ x, z, hw: w / 2, hd: d / 2, mesh: m });
}
const obsLayout = [
  [0, 0, 5, 5, 2.4], [16, 10, 4, 4, 2], [-15, 12, 3.5, 6, 2.2],
  [12, -16, 6, 3.5, 2], [-14, -13, 4, 4, 2.4], [-2, 20, 4, 3, 1.8],
  [22, -4, 3, 5, 2], [-22, -2, 4, 3.5, 2.1], [4, -24, 5, 4, 2],
];
obsLayout.forEach(o => addObstacle(...o));

// bushes (stealth) — translucent green discs
const bushes = [];
function addBush(x, z, r) {
  const m = new THREE.Mesh(
    new THREE.CircleGeometry(r, 24),
    new THREE.MeshBasicMaterial({ color: 0x2f6b34, transparent: true, opacity: 0.62, depthWrite: false })
  );
  m.rotation.x = -Math.PI / 2; m.position.set(x, 0.05, z); m.renderOrder = 1; scene.add(m);
  bushes.push({ x, z, r });
}
[[9, 6, 3.5], [-8, -6, 3.5], [18, -10, 3], [-18, 8, 3], [6, -12, 3], [-5, 16, 3], [24, 14, 3.2], [-24, -14, 3.2]].forEach(b => addBush(...b));

// storm wall (closing cylinder)
const stormMat = new THREE.MeshBasicMaterial({ color: 0x9b5bff, transparent: true, opacity: 0.18, side: THREE.BackSide, depthWrite: false });
const storm = new THREE.Mesh(new THREE.CylinderGeometry(CFG.worldRadius, CFG.worldRadius, 16, 64, 1, true), stormMat);
storm.position.y = 8; scene.add(storm);
let stormRadius = CFG.worldRadius;

// ===========================================================================
// UNITS
// ===========================================================================
const units = [];
function makeUnit(opts) {
  const grp = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color: opts.color, roughness: 0.55, metalness: 0.1, emissive: opts.color, emissiveIntensity: 0.0 });
  const body = new THREE.Mesh(new THREE.CapsuleGeometry(CFG.unitRadius, 1.0, 6, 14), mat);
  body.position.y = 1.3; body.castShadow = true; grp.add(body);
  // facing indicator (gun/snout)
  const snout = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 1.3), new THREE.MeshStandardMaterial({ color: 0x222028 }));
  snout.position.set(0, 1.35, 0.9); grp.add(snout);
  scene.add(grp);

  const u = {
    ...opts, grp, body, mat,
    pos: new THREE.Vector3(opts.x, 0, opts.z),
    vel: new THREE.Vector3(),
    facing: Math.random() * Math.PI * 2,
    hp: opts.maxHp, alive: true,
    ammo: CFG.ammo.max, reloadT: 0, fireT: 0,
    cdDash: 0, cdScatter: 0,
    dashT: 0, iframeT: 0, dashDir: new THREE.Vector3(),
    ult: 0, ultT: 0,
    lastHitT: 0, flash: 0, knock: new THREE.Vector3(),
    // ai
    ai: opts.isPlayer ? null : { state: 'wander', wander: new THREE.Vector3(), wanderT: 0, target: null, strafe: Math.random() < 0.5 ? 1 : -1, react: 0 },
    kills: 0,
  };
  units.push(u);
  return u;
}

// spawn ring
function spawnAll() {
  const player = makeUnit({ name: '당신', color: COLORS.player, maxHp: CFG.player.hp, speed: CFG.player.speed, x: 0, z: 30, isPlayer: true });
  GAME.player = player;
  for (let i = 0; i < CFG.bot.count; i++) {
    const a = (i / CFG.bot.count) * Math.PI * 2;
    makeUnit({
      name: BOT_NAMES[i % BOT_NAMES.length], color: COLORS.bots[i % COLORS.bots.length],
      maxHp: CFG.bot.hp, speed: CFG.bot.speed, x: Math.sin(a) * 30, z: Math.cos(a) * 30 - 4, isPlayer: false,
    });
  }
}
const BOT_NAMES = ['렌', '카이', '미라', '제로', '루나', '바이퍼', '노바', '글리치'];

// ===========================================================================
// PROJECTILES + EFFECTS
// ===========================================================================
const projGeo = new THREE.SphereGeometry(CFG.proj.radius, 8, 8);
const projectiles = [];
function fireProjectile(owner, dir, dmg, color) {
  const mat = new THREE.MeshBasicMaterial({ color });
  const mesh = new THREE.Mesh(projGeo, mat);
  const p = owner.pos.clone(); p.y = 1.35;
  p.add(dir.clone().multiplyScalar(1.1));
  mesh.position.copy(p); scene.add(mesh);
  // trail
  const trail = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.18, 1.4, 6),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.5 }));
  mesh.add(trail); trail.rotation.x = Math.PI / 2; trail.position.z = -0.7;
  projectiles.push({ mesh, owner, dir: dir.clone(), dmg, life: CFG.proj.life, color });
  muzzleFlash(p, color);
}

const puffs = [];
function spawnPuff(pos, color, n, spd, size) {
  for (let i = 0; i < n; i++) {
    const m = new THREE.Mesh(new THREE.SphereGeometry(size * (0.6 + Math.random() * 0.8), 6, 6),
      new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9 }));
    m.position.copy(pos);
    const v = new THREE.Vector3((Math.random() - 0.5), Math.random() * 0.8, (Math.random() - 0.5)).normalize().multiplyScalar(spd * (0.5 + Math.random()));
    scene.add(m);
    puffs.push({ mesh: m, v, life: 0.5 + Math.random() * 0.3 });
  }
}
function muzzleFlash(pos, color) { spawnPuff(pos, color, 3, 5, 0.16); }

// floating damage numbers + nameplates use DOM overlay
const overlay = document.getElementById('overlay');
const floaters = [];
function floatDamage(pos, amount, crit) {
  const el = document.createElement('div');
  el.className = 'dmg';
  el.textContent = Math.round(amount);
  el.style.color = crit ? '#fff' : '#ffd27a';
  if (crit) el.style.fontSize = '22px';
  overlay.appendChild(el);
  floaters.push({ el, pos: pos.clone(), t: 0, life: 0.8, ox: (Math.random() - 0.5) * 20 });
}

// nameplate pool: one hp bar + label per unit
function attachPlate(u) {
  const wrap = document.createElement('div'); wrap.className = 'bar';
  const hpwrap = document.createElement('div'); hpwrap.className = 'hpwrap';
  const fill = document.createElement('div'); fill.className = 'hpfill' + (u.isPlayer ? '' : ' enemy');
  hpwrap.appendChild(fill); wrap.appendChild(hpwrap);
  const label = document.createElement('div'); label.className = 'nplabel';
  label.textContent = u.name; label.style.color = '#' + u.color.toString(16).padStart(6, '0');
  overlay.appendChild(wrap); overlay.appendChild(label);
  u.plate = { wrap, fill, label };
}

// ===========================================================================
// INPUT
// ===========================================================================
const keys = {};
const mouse = new THREE.Vector2();
let firing = false;
const aimPoint = new THREE.Vector3();
const raycaster = new THREE.Raycaster();
const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

addEventListener('keydown', e => {
  keys[e.code] = true;
  if (!GAME.running) return;
  if (e.code === 'KeyQ') tryDash(GAME.player);
  if (e.code === 'KeyE') tryScatter(GAME.player);
  if (e.code === 'KeyR') tryUlt(GAME.player);
  if (e.code === 'Space') { tryDash(GAME.player); e.preventDefault(); }
});
addEventListener('keyup', e => { keys[e.code] = false; });
addEventListener('mousemove', e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
});
renderer.domElement.addEventListener('mousedown', e => { if (e.button === 0) firing = true; });
addEventListener('mouseup', e => { if (e.button === 0) firing = false; });
addEventListener('contextmenu', e => e.preventDefault());
addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function updateAim() {
  raycaster.setFromCamera(mouse, camera);
  raycaster.ray.intersectPlane(groundPlane, aimPoint);
}

// ===========================================================================
// ABILITIES
// ===========================================================================
function dirFromFacing(u) { return new THREE.Vector3(Math.sin(u.facing), 0, Math.cos(u.facing)); }

function tryFire(u) {
  if (u.fireT > 0 || u.dashT > 0) return;
  const overdrive = u.ultT > 0;
  if (!overdrive && u.ammo <= 0) return;
  const dir = dirFromFacing(u);
  fireProjectile(u, dir, CFG.proj.dmg, u.color);
  u.fireT = CFG.ammo.fireCd * (overdrive ? CFG.ult.fireMul : 1);
  if (!overdrive) u.ammo--;
  // recoil knock-back feel
  spawnPuff(u.pos.clone().setY(1.35), u.color, 1, 2, 0.1);
}

function tryDash(u) {
  if (!u || !u.alive || u.cdDash > 0 || u.dashT > 0) return;
  // dash toward movement input (player) or toward facing (bot)
  let d;
  if (u.isPlayer) {
    d = moveInputVec();
    if (d.lengthSq() < 0.01) d = dirFromFacing(u);
  } else d = dirFromFacing(u);
  u.dashDir.copy(d.normalize());
  u.dashT = CFG.dash.time; u.iframeT = CFG.dash.iframe; u.cdDash = CFG.dash.cd;
  spawnPuff(u.pos.clone().setY(1.0), 0xffffff, 6, 6, 0.14);
}

function tryScatter(u) {
  if (!u || !u.alive || u.cdScatter > 0 || u.dashT > 0) return;
  u.cdScatter = CFG.scatter.cd;
  const base = u.facing;
  for (let i = 0; i < CFG.scatter.count; i++) {
    const t = (i / (CFG.scatter.count - 1) - 0.5) * 2; // -1..1
    const a = base + t * CFG.scatter.spread;
    fireProjectile(u, new THREE.Vector3(Math.sin(a), 0, Math.cos(a)), CFG.scatter.dmg, u.color);
  }
}

function tryUlt(u) {
  if (!u || !u.alive || u.ult < CFG.ult.max || u.ultT > 0) return;
  u.ult = 0; u.ultT = CFG.ult.dur;
  u.mat.emissiveIntensity = 0.6;
  spawnPuff(u.pos.clone().setY(1.4), 0xd39bff, 24, 9, 0.22);
  if (u.isPlayer) addFeed(`<b>오버드라이브!</b>`);
}

function gainUlt(u, amount) {
  if (u.ultT > 0) return;
  u.ult = Math.min(CFG.ult.max, u.ult + amount);
}

// ===========================================================================
// DAMAGE
// ===========================================================================
function damage(target, amount, source, knockDir) {
  if (!target.alive || target.iframeT > 0) return;
  const crit = Math.random() < 0.15;
  const dmg = crit ? amount * 1.6 : amount;
  target.hp -= dmg;
  target.lastHitT = 0; target.flash = 0.12;
  if (knockDir) target.knock.add(knockDir.clone().setY(0).normalize().multiplyScalar(CFG.proj.knock));
  floatDamage(target.pos.clone().setY(2.6), dmg, crit);
  if (source) gainUlt(source, CFG.ult.perHit);
  if (target.isPlayer) shake(0.5 + (crit ? 0.3 : 0));
  if (target.hp <= 0) kill(target, source);
}

function kill(target, source) {
  if (!target.alive) return;
  target.alive = false;
  spawnPuff(target.pos.clone().setY(1.3), target.color, 26, 8, 0.26);
  if (source && source !== target) {
    source.kills++;
    gainUlt(source, CFG.ult.perKill);
    if (source.isPlayer) addFeed(`<b>${source.name}</b> ▶ ${target.name} 처치`);
    else if (target.isPlayer) addFeed(`${source.name} ▶ <b>당신</b> 처치`);
    else addFeed(`${source.name} ▶ ${target.name}`);
  } else {
    addFeed(`${target.name} — 폭풍에 소멸`);
  }
  if (target.isPlayer) shake(1.2);
}

// ===========================================================================
// AI
// ===========================================================================
function nearestEnemy(u, maxDist) {
  let best = null, bd = maxDist * maxDist;
  for (const o of units) {
    if (o === u || !o.alive) continue;
    // stealth: hidden in bush unless close
    const inBush = bushes.some(b => Math.hypot(o.pos.x - b.x, o.pos.z - b.z) < b.r);
    const d2 = u.pos.distanceToSquared(o.pos);
    const eff = inBush ? 6 * 6 : bd;
    if (d2 < eff && d2 < bd) { bd = d2; best = o; }
  }
  return best;
}

function updateBotAI(u, dt) {
  const ai = u.ai;
  const safe = stormRadius - 2;
  const distC = Math.hypot(u.pos.x, u.pos.z);
  let move = new THREE.Vector3();

  // storm avoidance has priority
  if (distC > safe) {
    move.set(-u.pos.x, 0, -u.pos.z).normalize();
    u.facing = Math.atan2(move.x, move.z);
  } else {
    const target = nearestEnemy(u, CFG.bot.vision);
    ai.target = target;
    if (target) {
      const toT = target.pos.clone().sub(u.pos); toT.y = 0;
      const dist = toT.length();
      u.facing = Math.atan2(toT.x, toT.z);
      // kite: keep mid range
      const dir = toT.clone().normalize();
      if (dist > CFG.bot.fireRange * 0.8) move.add(dir);
      else if (dist < CFG.bot.fireRange * 0.45) move.sub(dir);
      // strafe
      move.add(new THREE.Vector3(-dir.z, 0, dir.x).multiplyScalar(ai.strafe * 0.8));
      if (Math.random() < 0.01) ai.strafe *= -1;
      // flee when low
      if (u.hp < u.maxHp * 0.28) move.copy(dir).multiplyScalar(-1);
      // fire with inaccuracy
      ai.react -= dt;
      if (dist < CFG.bot.fireRange && ai.react <= 0 && u.ammo > 0) {
        const jitter = (1 - CFG.bot.accuracy) * (Math.random() - 0.5) * 2;
        const a = u.facing + jitter;
        u.facing = a; tryFire(u); u.facing = Math.atan2(toT.x, toT.z);
        ai.react = 0.18 + Math.random() * 0.22;
      }
      // dodge dash occasionally
      if (Math.random() < 0.006) tryDash(u);
    } else {
      // wander
      ai.wanderT -= dt;
      if (ai.wanderT <= 0) {
        const a = Math.random() * Math.PI * 2;
        ai.wander.set(Math.sin(a), 0, Math.cos(a));
        ai.wanderT = 1 + Math.random() * 2;
      }
      move.add(ai.wander);
      u.facing = Math.atan2(ai.wander.x, ai.wander.z);
    }
  }
  return move;
}

// ===========================================================================
// MOVEMENT / PHYSICS
// ===========================================================================
function moveInputVec() {
  const v = new THREE.Vector3();
  if (keys['KeyW']) v.z -= 1;
  if (keys['KeyS']) v.z += 1;
  if (keys['KeyA']) v.x -= 1;
  if (keys['KeyD']) v.x += 1;
  return v;
}

function collideObstacles(u) {
  for (const o of obstacles) {
    const dx = u.pos.x - o.x, dz = u.pos.z - o.z;
    const px = o.hw + CFG.unitRadius - Math.abs(dx);
    const pz = o.hd + CFG.unitRadius - Math.abs(dz);
    if (px > 0 && pz > 0) {
      if (px < pz) u.pos.x += px * Math.sign(dx || 1);
      else u.pos.z += pz * Math.sign(dz || 1);
    }
  }
}

function stepUnit(u, dt) {
  if (!u.alive) return;
  // timers
  u.fireT = Math.max(0, u.fireT - dt);
  u.cdDash = Math.max(0, u.cdDash - dt);
  u.cdScatter = Math.max(0, u.cdScatter - dt);
  u.iframeT = Math.max(0, u.iframeT - dt);
  u.lastHitT += dt;
  u.flash = Math.max(0, u.flash - dt);
  if (u.ultT > 0) { u.ultT -= dt; if (u.ultT <= 0) u.mat.emissiveIntensity = 0; }
  // ammo reload
  if (u.ammo < CFG.ammo.max) { u.reloadT += dt; if (u.reloadT >= CFG.ammo.reload) { u.ammo++; u.reloadT = 0; } }
  // hp regen out of combat
  if (u.lastHitT > CFG.player.regenDelay && u.hp < u.maxHp) u.hp = Math.min(u.maxHp, u.hp + CFG.player.regen * dt);

  const speed = u.speed * (u.ultT > 0 ? CFG.ult.speedMul : 1);

  // dash overrides normal move
  if (u.dashT > 0) {
    u.dashT -= dt;
    const dashSpeed = CFG.dash.dist / CFG.dash.time;
    u.pos.addScaledVector(u.dashDir, dashSpeed * dt);
  } else {
    let move;
    if (u.isPlayer) {
      move = moveInputVec();
      // face the aim cursor
      const toA = aimPoint.clone().sub(u.pos); toA.y = 0;
      if (toA.lengthSq() > 0.01) u.facing = Math.atan2(toA.x, toA.z);
    } else {
      move = updateBotAI(u, dt);
    }
    if (move.lengthSq() > 0.001) {
      move.normalize();
      u.pos.addScaledVector(move, speed * dt);
    }
  }

  // knockback
  if (u.knock.lengthSq() > 0.001) {
    u.pos.addScaledVector(u.knock, dt);
    u.knock.multiplyScalar(Math.max(0, 1 - dt * 8));
  }

  // bound to world
  const d = Math.hypot(u.pos.x, u.pos.z);
  if (d > CFG.worldRadius) { u.pos.x *= CFG.worldRadius / d; u.pos.z *= CFG.worldRadius / d; }
  collideObstacles(u);

  // storm damage
  if (d > stormRadius) damage(u, CFG.storm.dps * dt, null, null);

  // player auto-fire
  if (u.isPlayer && firing) tryFire(u);

  // apply transform
  u.grp.position.copy(u.pos);
  u.grp.rotation.y = u.facing;
  // bush transparency for self read
  const inBush = bushes.some(b => Math.hypot(u.pos.x - b.x, u.pos.z - b.z) < b.r);
  u.body.material.opacity = inBush ? 0.55 : 1;
  u.body.material.transparent = inBush;
  // flash
  u.mat.emissive.setHex(u.flash > 0 ? 0xffffff : u.color);
  if (u.ultT <= 0) u.mat.emissiveIntensity = u.flash > 0 ? 0.9 : 0;
}

function stepProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.life -= dt;
    p.mesh.position.addScaledVector(p.dir, CFG.proj.speed * dt);
    p.mesh.rotation.z += dt * 10;
    let dead = p.life <= 0;
    // obstacle hit
    if (!dead) for (const o of obstacles) {
      if (Math.abs(p.mesh.position.x - o.x) < o.hw + 0.3 && Math.abs(p.mesh.position.z - o.z) < o.hd + 0.3 && p.mesh.position.y < o.mesh.geometry.parameters.height + 0.5) {
        spawnPuff(p.mesh.position.clone(), p.color, 4, 4, 0.12); dead = true; break;
      }
    }
    // unit hit
    if (!dead) for (const u of units) {
      if (u === p.owner || !u.alive) continue;
      const dx = p.mesh.position.x - u.pos.x, dz = p.mesh.position.z - u.pos.z;
      if (dx * dx + dz * dz < (CFG.unitRadius + CFG.proj.radius + 0.2) ** 2) {
        damage(u, p.dmg, p.owner, p.dir);
        spawnPuff(p.mesh.position.clone().setY(1.4), p.color, 5, 4, 0.14);
        dead = true; break;
      }
    }
    // out of bounds
    if (Math.hypot(p.mesh.position.x, p.mesh.position.z) > CFG.worldRadius + 4) dead = true;
    if (dead) { scene.remove(p.mesh); projectiles.splice(i, 1); }
  }
}

function stepPuffs(dt) {
  for (let i = puffs.length - 1; i >= 0; i--) {
    const p = puffs[i]; p.life -= dt;
    p.mesh.position.addScaledVector(p.v, dt);
    p.v.y -= dt * 6;
    p.mesh.material.opacity = Math.max(0, p.life * 1.6);
    p.mesh.scale.multiplyScalar(1 - dt * 1.2);
    if (p.life <= 0) { scene.remove(p.mesh); puffs.splice(i, 1); }
  }
}

// ===========================================================================
// CAMERA / SHAKE
// ===========================================================================
let shakeAmt = 0;
function shake(a) { shakeAmt = Math.min(1.5, shakeAmt + a); }
function updateCamera(dt) {
  const p = GAME.player;
  const focus = p && p.alive ? p.pos : new THREE.Vector3();
  const want = focus.clone().add(CAM_OFF);
  camera.position.lerp(want, 1 - Math.exp(-dt * 6));
  const look = focus.clone();
  if (shakeAmt > 0) {
    camera.position.x += (Math.random() - 0.5) * shakeAmt;
    camera.position.y += (Math.random() - 0.5) * shakeAmt;
    shakeAmt = Math.max(0, shakeAmt - dt * 3);
  }
  camera.lookAt(look);
  sun.target.position.copy(focus); sun.position.copy(focus).add(new THREE.Vector3(30, 50, 18));
}

// ===========================================================================
// HUD
// ===========================================================================
const elAlive = document.getElementById('alive');
const elStorm = document.getElementById('stormtxt');
const elFeed = document.getElementById('feed');
const elHpFill = document.getElementById('hpbigfill');
const elHpTxt = document.getElementById('hpbigtxt');
const elAmmo = document.getElementById('ammo');
const elUltFill = document.getElementById('ultfill');
const elUltWrap = document.getElementById('ultwrap');
const elVignette = document.getElementById('vignette');
const cdEls = { dash: document.querySelector('#sk-q .cd'), scatter: document.querySelector('#sk-e .cd'), ult: document.querySelector('#sk-r .cd') };
const mm = document.getElementById('minimap').getContext('2d');

for (let i = 0; i < CFG.ammo.max; i++) { const d = document.createElement('div'); d.className = 'pip full'; elAmmo.appendChild(d); }
const ammoPips = [...elAmmo.children];

function addFeed(html) {
  const row = document.createElement('div'); row.className = 'feedrow'; row.innerHTML = html;
  elFeed.prepend(row);
  while (elFeed.children.length > 6) elFeed.lastChild.remove();
  setTimeout(() => row.remove(), 5000);
}

const tmpV = new THREE.Vector3();
function worldToScreen(pos) {
  tmpV.copy(pos).project(camera);
  return { x: (tmpV.x * 0.5 + 0.5) * window.innerWidth, y: (-tmpV.y * 0.5 + 0.5) * window.innerHeight, vis: tmpV.z < 1 };
}

function updateHUD(dt) {
  const p = GAME.player;
  // alive count
  const alive = units.filter(u => u.alive).length;
  elAlive.innerHTML = `${alive} <small>남음</small>`;
  // storm text
  if (GAME.stormTimer < CFG.storm.grace) elStorm.textContent = `폭풍 시작까지 ${Math.ceil(CFG.storm.grace - GAME.stormTimer)}s`;
  else elStorm.textContent = `⚠ 폭풍 수축 중 — 반경 ${stormRadius.toFixed(0)}`;

  if (p) {
    elHpFill.style.width = Math.max(0, p.hp / p.maxHp * 100) + '%';
    elHpTxt.textContent = `${Math.max(0, Math.ceil(p.hp))} / ${p.maxHp}`;
    ammoPips.forEach((pip, i) => pip.classList.toggle('full', i < p.ammo || p.ultT > 0));
    elUltFill.style.width = (p.ult / CFG.ult.max * 100) + '%';
    elUltWrap.classList.toggle('ready', p.ult >= CFG.ult.max);
    cdEls.dash.style.transform = `scaleY(${p.cdDash / CFG.dash.cd})`;
    cdEls.scatter.style.transform = `scaleY(${p.cdScatter / CFG.scatter.cd})`;
    cdEls.ult.style.transform = `scaleY(${p.ult >= CFG.ult.max ? 0 : 1 - p.ult / CFG.ult.max})`;
    // low hp vignette
    const lowness = p.alive ? Math.max(0, 1 - p.hp / (p.maxHp * 0.4)) : 1;
    elVignette.style.boxShadow = `inset 0 0 220px rgba(150,12,12,${(p.alive ? lowness : 0.5) * 0.85})`;
  }

  // nameplates
  for (const u of units) {
    if (!u.plate) continue;
    if (!u.alive) { u.plate.wrap.style.display = 'none'; u.plate.label.style.display = 'none'; continue; }
    const s = worldToScreen(tmpV.copy(u.pos).setY(3.0));
    const sl = worldToScreen(tmpV.copy(u.pos).setY(3.5));
    if (s.vis) {
      u.plate.wrap.style.display = ''; u.plate.label.style.display = '';
      u.plate.wrap.style.left = s.x + 'px'; u.plate.wrap.style.top = s.y + 'px';
      u.plate.fill.style.width = Math.max(0, u.hp / u.maxHp * 100) + '%';
      u.plate.label.style.left = sl.x + 'px'; u.plate.label.style.top = sl.y + 'px';
    } else { u.plate.wrap.style.display = 'none'; u.plate.label.style.display = 'none'; }
  }

  // floaters
  for (let i = floaters.length - 1; i >= 0; i--) {
    const f = floaters[i]; f.t += dt;
    const s = worldToScreen(tmpV.copy(f.pos).setY(2.6 + f.t * 1.6));
    f.el.style.left = (s.x + f.ox) + 'px'; f.el.style.top = s.y + 'px';
    f.el.style.opacity = Math.max(0, 1 - f.t / f.life);
    if (f.t >= f.life) { f.el.remove(); floaters.splice(i, 1); }
  }

  drawMinimap();
}

function drawMinimap() {
  const W = 132, H = 132, cx = W / 2, cy = H / 2, sc = (W / 2 - 6) / CFG.worldRadius;
  mm.clearRect(0, 0, W, H);
  // storm circle
  mm.beginPath(); mm.arc(cx, cy, stormRadius * sc, 0, Math.PI * 2);
  mm.strokeStyle = 'rgba(155,91,255,0.9)'; mm.lineWidth = 2; mm.stroke();
  mm.fillStyle = 'rgba(155,91,255,0.08)'; mm.fill();
  // obstacles
  mm.fillStyle = 'rgba(160,130,90,0.7)';
  for (const o of obstacles) mm.fillRect(cx + o.x * sc - 2, cy + o.z * sc - 2, 4, 4);
  // units
  for (const u of units) {
    if (!u.alive) continue;
    mm.beginPath(); mm.arc(cx + u.pos.x * sc, cy + u.pos.z * sc, u.isPlayer ? 3.5 : 2.6, 0, Math.PI * 2);
    mm.fillStyle = '#' + u.color.toString(16).padStart(6, '0'); mm.fill();
    if (u.isPlayer) { mm.strokeStyle = '#fff'; mm.lineWidth = 1.5; mm.stroke(); }
  }
}

// ===========================================================================
// GAME STATE / LOOP
// ===========================================================================
const GAME = { running: false, player: null, stormTimer: 0, ended: false };

function startMatch() {
  // reset
  for (const u of units) { scene.remove(u.grp); if (u.plate) { u.plate.wrap.remove(); u.plate.label.remove(); } }
  units.length = 0;
  for (const p of projectiles) scene.remove(p.mesh); projectiles.length = 0;
  for (const p of puffs) scene.remove(p.mesh); puffs.length = 0;
  floaters.forEach(f => f.el.remove()); floaters.length = 0;
  elFeed.innerHTML = '';
  stormRadius = CFG.worldRadius; storm.scale.set(1, 1, 1);
  GAME.stormTimer = 0; GAME.ended = false;

  spawnAll();
  units.forEach(attachPlate);
  GAME.running = true;
}

function endMatch(victory) {
  GAME.running = false; GAME.ended = true;
  const p = GAME.player;
  const place = victory ? 1 : units.filter(u => u.alive).length + 1;
  document.getElementById('resulttitle').textContent = victory ? 'VICTORY' : 'DEFEAT';
  document.getElementById('resulttitle').style.color = victory ? '#ffd27a' : '#ff6b5f';
  document.getElementById('result').textContent = victory ? '🏆 최후의 1인!' : '쓰러졌습니다';
  document.getElementById('killcount').textContent = p ? p.kills : 0;
  document.getElementById('placecount').textContent = '#' + place;
  document.getElementById('resultscreen').classList.remove('hidden');
}

const clock = new THREE.Clock();
let acc = 0; const FIXED = 1 / 60;
function loop() {
  requestAnimationFrame(loop);
  let dt = Math.min(0.05, clock.getDelta());

  if (GAME.running) {
    acc += dt;
    while (acc >= FIXED) {
      GAME.stormTimer += FIXED;
      // storm shrink
      if (GAME.stormTimer > CFG.storm.grace) {
        const t = Math.min(1, (GAME.stormTimer - CFG.storm.grace) / CFG.storm.shrinkTime);
        stormRadius = CFG.worldRadius + (CFG.storm.minRadius - CFG.worldRadius) * t;
        storm.scale.set(stormRadius / CFG.worldRadius, 1, stormRadius / CFG.worldRadius);
      }
      updateAim();
      for (const u of units) stepUnit(u, FIXED);
      stepProjectiles(FIXED);
      stepPuffs(FIXED);
      acc -= FIXED;

      // win/lose check
      const alive = units.filter(u => u.alive);
      if (!GAME.ended) {
        if (!GAME.player.alive) endMatch(false);
        else if (alive.length <= 1) endMatch(true);
      }
    }
  } else {
    stepPuffs(dt);
  }

  updateCamera(dt);
  updateHUD(dt);
  renderer.render(scene, camera);
}

// idle preview spin before start
spawnAll(); units.forEach(attachPlate); GAME.player = units[0];
loop();

// buttons
document.getElementById('startbtn').addEventListener('click', () => {
  document.getElementById('startscreen').classList.add('hidden');
  startMatch();
});
document.getElementById('againbtn').addEventListener('click', () => {
  document.getElementById('resultscreen').classList.add('hidden');
  startMatch();
});
</script>
