<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>후유키 성배전쟁 — Fuyuki Grail War (prototype)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #05060c; touch-action: none; -webkit-user-select: none; user-select: none; }
  body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', system-ui, sans-serif; color: #ede6f2; cursor: crosshair; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  #overlay { position: fixed; inset: 0; pointer-events: none; z-index: 4; overflow: hidden; }
  .bar { position: absolute; transform: translate(-50%, -50%); }
  .hpwrap { width: 50px; height: 5px; background: rgba(0,0,0,0.6); border: 1px solid rgba(0,0,0,0.7); border-radius: 3px; overflow: hidden; }
  .hpfill { height: 100%; width: 100%; background: linear-gradient(90deg,#6fe0ff,#3aa0e0); }
  .hpfill.enemy { background: linear-gradient(90deg,#ff6b5f,#e0392c); }
  .nplabel { position: absolute; transform: translate(-50%,-100%); font-size: 11px; font-weight: 700; text-shadow: 0 1px 3px #000; white-space: nowrap; }
  .dmg { position: absolute; transform: translate(-50%,-50%); font-weight: 800; font-size: 16px; text-shadow: 0 2px 3px #000; }

  #hud { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
  #vignette { position: fixed; inset: 0; pointer-events: none; z-index: 3; box-shadow: inset 0 0 220px rgba(120,10,10,0); transition: box-shadow 0.25s; }

  #topbar { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); text-align: center; }
  #alive { font-size: 24px; font-weight: 800; text-shadow: 0 2px 6px #000; }
  #alive small { font-size: 13px; font-weight: 400; color: #b7a9c9; letter-spacing: 2px; }
  #zonetxt { font-size: 12px; color: #c79bff; margin-top: 2px; letter-spacing: 1px; }
  #region { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:40px; font-weight:800; letter-spacing:10px;
    color:#fff; text-shadow:0 0 24px rgba(180,120,255,0.7); opacity:0; transition:opacity 0.5s; }

  #feed { position: absolute; top: 12px; right: 16px; width: 280px; text-align: right; }
  .feedrow { font-size: 13px; margin-bottom: 3px; opacity: 0; animation: feedin 0.2s forwards; text-shadow: 0 1px 3px #000; }
  .feedrow b { color: #ffd27a; }
  @keyframes feedin { from {opacity:0;transform:translateX(12px);} to {opacity:1;transform:none;} }

  #minimap { position: absolute; top: 64px; right: 16px; width: 140px; height: 140px; border: 2px solid rgba(200,160,255,0.25); border-radius: 8px; background: rgba(8,8,18,0.6); }

  #panel { position: absolute; left: 22px; bottom: 22px; width: 270px; }
  #svname { font-size: 13px; color: #c79bff; letter-spacing: 1px; margin-bottom: 4px; font-weight: 700; }
  #hpbig { width: 270px; height: 20px; background: rgba(0,0,0,0.5); border: 1px solid rgba(0,0,0,0.6); border-radius: 5px; overflow: hidden; position: relative; }
  #hpbigfill { height: 100%; width: 100%; background: linear-gradient(90deg,#6fe0ff,#3aa0e0); transition: width 0.1s; }
  #hpbigtxt { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; text-shadow: 0 1px 2px #000; }
  #seals { display: flex; gap: 6px; margin-top: 8px; align-items: center; }
  #seals .lbl { font-size: 11px; color: #e0a0a0; margin-right: 2px; }
  .seal { width: 16px; height: 16px; border-radius: 50%; background: radial-gradient(circle at 40% 35%, #ff5b5b, #8a0d12); box-shadow: 0 0 8px rgba(255,60,60,0.6); border: 1px solid #5a0a0a; }
  .seal.spent { background: #2a1018; box-shadow: none; opacity: 0.4; }
  #skills { display: flex; gap: 9px; margin-top: 11px; }
  .skill { width: 54px; height: 54px; border-radius: 10px; background: rgba(18,14,28,0.82); border: 1px solid rgba(255,255,255,0.12); position: relative; overflow: hidden; }
  .skill .key { position: absolute; top: 3px; left: 5px; font-size: 10px; color: #c7b6ff; font-weight: 700; }
  .skill .nm { font-size: 9px; color: #d8ccb6; position: absolute; bottom: 3px; width: 100%; text-align: center; }
  .skill .cd { position: absolute; inset: 0; background: rgba(0,0,0,0.66); transform-origin: bottom; transform: scaleY(0); }
  .skill.np { border-color: #c187ff; }
  #npwrap { width: 270px; height: 10px; margin-top: 11px; background: rgba(0,0,0,0.5); border-radius: 5px; overflow: hidden; border: 1px solid #15101f; position: relative; }
  #npfill { height: 100%; width: 0%; background: linear-gradient(90deg,#b06bff,#e0b0ff); transition: width 0.12s; }
  #npwrap.ready { box-shadow: 0 0 14px rgba(190,120,255,0.85); animation: ultpulse 1s infinite; }
  #npwrap .lbl { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:9px; color:#fff; text-shadow:0 1px 2px #000; letter-spacing:1px; }
  @keyframes ultpulse { 0%,100%{filter:brightness(1);} 50%{filter:brightness(1.5);} }

  .screen { position: fixed; inset: 0; z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(ellipse at center, rgba(28,16,52,0.94), rgba(6,6,14,0.97)); text-align: center; cursor: default; padding: 20px; }
  .screen.hidden { display: none; }
  .screen h1 { font-size: 44px; letter-spacing: 6px; font-weight: 800; text-shadow: 0 0 30px rgba(160,100,255,0.6); margin-bottom: 4px; }
  .screen h2 { font-size: 14px; letter-spacing: 4px; color: #b79bff; margin-bottom: 26px; font-weight: 400; }
  .cards { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
  .card { width: 200px; background: rgba(16,12,28,0.85); border: 2px solid rgba(255,255,255,0.12); border-radius: 14px; padding: 18px 16px; cursor: pointer; pointer-events: auto; transition: transform 0.12s, border-color 0.12s; text-align: left; }
  .card:hover { transform: translateY(-4px); }
  .card.sel { border-color: #ffd27a; box-shadow: 0 0 22px rgba(255,180,60,0.3); }
  .card .cls { font-size: 12px; letter-spacing: 3px; color: #c79bff; }
  .card .hn { font-size: 21px; font-weight: 800; margin: 2px 0 8px; }
  .card .role { font-size: 12px; color: #b7a9c9; margin-bottom: 8px; }
  .card .np { font-size: 12px; color: #ffd27a; }
  .card .kit { font-size: 11px; color: #cdbfae; line-height: 1.7; margin-top: 8px; }
  .swatch { display:inline-block; width:11px; height:11px; border-radius:50%; vertical-align:middle; margin-right:5px; }
  .btn { margin-top: 26px; padding: 13px 42px; font-size: 16px; font-weight: 700; letter-spacing: 3px; color: #1a1026; background: linear-gradient(180deg,#ffd27a,#ffae3b); border: none; border-radius: 10px; cursor: pointer; pointer-events: auto; box-shadow: 0 6px 20px rgba(255,170,60,0.35); }
  .btn:disabled { opacity: 0.4; cursor: default; }
  #result { font-size: 18px; color: #d8ccb6; margin-bottom: 8px; letter-spacing: 2px; }
  .place { color: #ffd27a; font-weight: 800; }

  /* touch */
  #touch { position: fixed; inset: 0; z-index: 6; pointer-events: none; }
  #touch.hidden { display: none; }
  .stick { position: absolute; width: 118px; height: 118px; margin: -59px 0 0 -59px; border-radius: 50%; background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.16); display: none; }
  .stick .knob { position: absolute; left: 50%; top: 50%; width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.3); transform: translate(-50%,-50%); }
  #aim-stick .knob { background: rgba(255,180,90,0.42); }
  #tbtns { position: absolute; right: 18px; bottom: 120px; display: grid; grid-template-columns: 64px 64px; gap: 12px; pointer-events: auto; }
  .tbtn { width: 64px; height: 64px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.22); background: rgba(18,14,28,0.82); color: #c7b6ff; font-size: 11px; font-weight: 800; line-height: 1.15; }
  .tbtn b { font-size: 17px; display: block; }
  .tbtn.np { border-color: #c187ff; color: #e0b0ff; }
  .tbtn.seal { border-color: #ff6b6b; color: #ff9a9a; }
  .tbtn:active { background: rgba(58,46,88,0.9); }
</style>
</head>
<body>
<div id="app"></div>
<div id="vignette"></div>
<div id="overlay"></div>

<div id="hud">
  <div id="topbar"><div id="alive">7 <small>서번트</small></div><div id="zonetxt">성배 결계 안정…</div></div>
  <div id="region"></div>
  <div id="feed"></div>
  <canvas id="minimap" width="140" height="140"></canvas>
  <div id="panel">
    <div id="svname">— 세이버 —</div>
    <div id="hpbig"><div id="hpbigfill"></div><div id="hpbigtxt">130 / 130</div></div>
    <div id="seals"><span class="lbl">영주</span><div class="seal"></div><div class="seal"></div><div class="seal"></div></div>
    <div id="skills">
      <div class="skill" id="sk-q"><span class="key">Q</span><span class="nm">스킬</span><div class="cd"></div></div>
      <div class="skill" id="sk-e"><span class="key">E</span><span class="nm">스킬</span><div class="cd"></div></div>
      <div class="skill np" id="sk-r"><span class="key">R</span><span class="nm">보구</span><div class="cd"></div></div>
    </div>
    <div id="npwrap"><div id="npfill"></div><div class="lbl">보구 게이지</div></div>
  </div>
</div>

<div id="touch" class="hidden">
  <div class="stick" id="move-stick"><div class="knob"></div></div>
  <div class="stick" id="aim-stick"><div class="knob"></div></div>
  <div id="tbtns">
    <button class="tbtn" id="tb-q"><b>Q</b>스킬</button>
    <button class="tbtn" id="tb-e"><b>E</b>스킬</button>
    <button class="tbtn np" id="tb-r"><b>★</b>보구</button>
    <button class="tbtn seal" id="tb-c"><b>♦</b>영주</button>
  </div>
</div>

<!-- servant select -->
<div class="screen" id="startscreen">
  <h1>후유키 성배전쟁</h1>
  <h2>F U Y U K I　G R A I L　W A R　·　prototype</h2>
  <div class="cards" id="cards"></div>
  <button class="btn" id="startbtn" disabled>서번트를 선택하세요</button>
</div>

<div class="screen hidden" id="resultscreen">
  <div id="result">성배전쟁 종료</div>
  <h1 id="resulttitle">VICTORY</h1>
  <div style="font-size:14px;color:#c9bda8;letter-spacing:2px">처치 <span id="killcount" class="place">0</span>　·　순위 <span id="placecount" class="place">#1</span></div>
  <button class="btn" id="againbtn">다시 소환</button>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.165.0/build/three.module.js" } }

<script type="module">
import * as THREE from 'three';

// ===========================================================================
// SERVANT DATA — 정식 Fate 영령 (팬 프로토타입)
// ===========================================================================
const SERVANTS = {
  saber: {
    cls: 'SABER', name: '세이버', hero: '아르토리아 펜드래곤', role: '균형 근접 · 강력한 보구',
    color: 0x3f6fd6, accent: 0xffe9a0, hp: 140, speed: 8.6, weapon: 'sword',
    basic: { kind: 'melee', cd: 0.55, dmg: 22, range: 3.4, arc: 1.2, knock: 3 },
    q: { name: '차지', cd: 6, kind: 'dashStrike', dist: 10, dmg: 34 },
    e: { name: '마력방출', cd: 8, kind: 'buff', dur: 3, speed: 1.45 },
    np: { name: '엑스칼리버', kind: 'beam', dmg: 95, range: 36, width: 5.5, charge: 0.7 },
  },
  lancer: {
    cls: 'LANCER', name: '랜서', hero: '쿠 훌린', role: '고속 일격이탈 · 확정 명중',
    color: 0xd64646, accent: 0x6fd0ff, hp: 115, speed: 9.8, weapon: 'spear',
    basic: { kind: 'melee', cd: 0.40, dmg: 16, range: 5.0, arc: 0.5, knock: 2 },
    q: { name: '도약돌진', cd: 5, kind: 'dashStrike', dist: 12, dmg: 24 },
    e: { name: '회피', cd: 6, kind: 'dodge', dist: 8 },
    np: { name: '게이볼그', kind: 'pierce', dmg: 130, range: 22 },
  },
  archer: {
    cls: 'ARCHER', name: '아처', hero: 'EMIYA', role: '원거리 견제 · 투사검',
    color: 0x9a3030, accent: 0xff8a3a, hp: 110, speed: 8.4, weapon: 'bow',
    basic: { kind: 'shot', cd: 0.30, dmg: 18, speed: 30, knock: 2 },
    q: { name: '투사검 산탄', cd: 6, kind: 'scatter', count: 5, spread: 0.42, dmg: 13, speed: 28 },
    e: { name: '도약 재배치', cd: 6, kind: 'dodge', dist: 9 },
    np: { name: '무한의 검제', kind: 'bladeRain', dmg: 16, radius: 9, range: 16, dur: 3.2 },
  },
};
const SVKEYS = ['saber', 'lancer', 'archer'];

// ===========================================================================
// CONFIG
// ===========================================================================
const CFG = {
  worldRadius: 60, unitRadius: 0.9,
  grail: { x: 0, z: 6 },           // 성배 강림지 (최종 수축 중심 = 시민공원)
  zone: { grace: 12, shrinkTime: 105, minRadius: 7, dps: 9 },
  npMax: 100, npPerHit: 6, npPerKill: 18, npPerSec: 2.2,
  seals: 3, sealBuff: 3.2, sealSpeed: 1.3,
  proj: { radius: 0.34, life: 1.2 },
  dash: { time: 0.16, iframe: 0.22 },
  regen: 7, regenDelay: 4,
  botCount: 6,
};
const BOT_HEROES = ['라이더', '캐스터', '어쌔신', '버서커', '세이버', '랜서', '아처'];

// ===========================================================================
// RENDERER / SCENE / CAMERA — 야간 후유키
// ===========================================================================
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.08;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a18);
scene.fog = new THREE.Fog(0x0a0a18, 60, 135);

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 500);
const CAM_OFF = new THREE.Vector3(0, 38, 27);
camera.position.copy(CAM_OFF); camera.lookAt(0, 0, 0);

scene.add(new THREE.HemisphereLight(0x5060a0, 0x0a0a14, 0.55));
const moon = new THREE.DirectionalLight(0xaec2ff, 0.9);
moon.position.set(-40, 60, -30); moon.castShadow = true;
moon.shadow.mapSize.set(2048, 2048);
moon.shadow.camera.near = 1; moon.shadow.camera.far = 200;
const sc = 80; Object.assign(moon.shadow.camera, { left: -sc, right: sc, top: sc, bottom: -sc });
moon.shadow.bias = -0.0004; scene.add(moon); scene.add(moon.target);
// moon disc
const moonDisc = new THREE.Mesh(new THREE.CircleGeometry(14, 32), new THREE.MeshBasicMaterial({ color: 0xfdfbe8, fog: false }));
moonDisc.position.set(-140, 95, -150); moonDisc.lookAt(0, 0, 0); scene.add(moonDisc);

// ===========================================================================
// TEXTURE HELPERS (procedural canvas)
// ===========================================================================
function makeCanvas(w, h, draw) {
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  draw(c.getContext('2d'), w, h);
  const t = new THREE.CanvasTexture(c); t.anisotropy = 4; return t;
}
function windowTex(lit) {
  return makeCanvas(128, 256, (g, w, h) => {
    g.fillStyle = '#11131f'; g.fillRect(0, 0, w, h);
    const cols = 4, rows = 9, pw = w / cols, ph = h / rows;
    for (let y = 0; y < rows; y++) for (let x = 0; x < cols; x++) {
      const on = Math.random() < (lit ? 0.62 : 0.18);
      g.fillStyle = on ? (Math.random() < 0.3 ? '#ffd98a' : '#bfe0ff') : '#0c0e16';
      g.globalAlpha = on ? (0.6 + Math.random() * 0.4) : 1;
      g.fillRect(x * pw + pw * 0.18, y * ph + ph * 0.2, pw * 0.64, ph * 0.55);
    }
    g.globalAlpha = 1;
  });
}
const TEX = { winLit: windowTex(true), winDim: windowTex(false) };

// ===========================================================================
// COLLISION (AABB boxes)
// ===========================================================================
const obstacles = []; // {x,z,hw,hd,h}
function box(x, z, w, d, h, mat) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, h / 2, z); m.castShadow = true; m.receiveShadow = true; scene.add(m);
  obstacles.push({ x, z, hw: w / 2, hd: d / 2, h });
  return m;
}

// ===========================================================================
// PROCEDURAL FUYUKI MAP
// ===========================================================================
const REGION_AT = []; // sampled labels for minimap flavor not needed; keep simple
function buildFuyuki() {
  // ground base
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a1c24, roughness: 1 });
  const ground = new THREE.Mesh(new THREE.CircleGeometry(CFG.worldRadius + 6, 72), groundMat);
  ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; scene.add(ground);

  // --- river (east-west strip at z=0) + Fuyuki Bridge ---
  const river = new THREE.Mesh(new THREE.PlaneGeometry(140, 16),
    new THREE.MeshStandardMaterial({ color: 0x0c1830, roughness: 0.25, metalness: 0.6, emissive: 0x0a1024, emissiveIntensity: 0.4 }));
  river.rotation.x = -Math.PI / 2; river.position.set(0, 0.04, 0); scene.add(river);
  buildBridge();

  // --- Shinto (north, z<0): skyscrapers ---
  const roadMat = new THREE.MeshStandardMaterial({ color: 0x14151c, roughness: 1 });
  for (let gx = -52; gx <= 52; gx += 13) {
    for (let gz = -56; gz <= -12; gz += 13) {
      if (Math.random() < 0.12) continue;
      const jx = gx + (Math.random() - 0.5) * 3, jz = gz + (Math.random() - 0.5) * 3;
      if (Math.hypot(jx, jz) > CFG.worldRadius - 3) continue;
      tower(jx, jz);
    }
  }
  // a couple of road strips (visual)
  for (let z = -50; z < -8; z += 13) { const r = new THREE.Mesh(new THREE.PlaneGeometry(110, 3.2), roadMat); r.rotation.x = -Math.PI / 2; r.position.set(0, 0.03, z); scene.add(r); }

  // --- park / Grail site (시민공원) near bridge, Shinto side ---
  const park = new THREE.Mesh(new THREE.CircleGeometry(12, 40),
    new THREE.MeshStandardMaterial({ color: 0x1f3a22, roughness: 1 }));
  park.rotation.x = -Math.PI / 2; park.position.set(CFG.grail.x, 0.05, CFG.grail.z - 0); scene.add(park);
  grailMarker(CFG.grail.x, CFG.grail.z);

  // --- Miyama (south, z>0): residential houses + church + forest + temple ---
  for (let gx = -50; gx <= 50; gx += 11) {
    for (let gz = 14; gz <= 40; gz += 11) {
      if (Math.random() < 0.18) continue;
      const jx = gx + (Math.random() - 0.5) * 3, jz = gz + (Math.random() - 0.5) * 3;
      if (Math.hypot(jx, jz) > CFG.worldRadius - 3) continue;
      if (Math.abs(jx) < 8 && jz > 44) continue; // leave temple approach
      house(jx, jz);
    }
  }
  church(26, 20);
  // forest belt + temple at far south
  for (let i = 0; i < 60; i++) {
    const a = Math.random() * Math.PI * 2, r = 38 + Math.random() * 20;
    const x = Math.sin(a) * r, z = 26 + Math.cos(a) * 0.4 * r;
    if (z < 20 || Math.hypot(x, z) > CFG.worldRadius + 2) continue;
    tree(x, z);
  }
  ryuudouTemple(0, 50);
  // scatter street lamps (emissive, cheap) both districts
  for (let i = 0; i < 26; i++) {
    const x = (Math.random() - 0.5) * 100, z = (Math.random() - 0.5) * 100;
    if (Math.hypot(x, z) > CFG.worldRadius - 2 || Math.abs(z) < 9) continue;
    lamp(x, z);
  }
}

function tower(x, z) {
  const h = 16 + Math.random() * 30;
  const w = 6 + Math.random() * 4, d = 6 + Math.random() * 4;
  const lit = Math.random() < 0.7;
  const tex = (lit ? TEX.winLit : TEX.winDim).clone(); tex.needsUpdate = true;
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(Math.round(w / 3), Math.round(h / 5));
  const mat = new THREE.MeshStandardMaterial({ color: 0x20232e, roughness: 0.8, map: tex, emissive: 0x223044, emissiveIntensity: lit ? 0.5 : 0.15, emissiveMap: tex });
  box(x, z, w, d, h, mat);
  // rooftop neon accent
  if (Math.random() < 0.5) {
    const neon = new THREE.Mesh(new THREE.BoxGeometry(w * 0.7, 0.5, 0.5),
      new THREE.MeshBasicMaterial({ color: [0xff4d6d, 0x4dd0ff, 0xffe14d, 0xb04dff][Math.floor(Math.random() * 4)] }));
    neon.position.set(x, h + 0.4, z); scene.add(neon);
  }
}

function house(x, z) {
  const w = 4 + Math.random() * 2, d = 4 + Math.random() * 2, h = 3 + Math.random() * 1.5;
  const wall = new THREE.MeshStandardMaterial({ color: 0x2b2620, roughness: 0.9 });
  box(x, z, w, d, h, wall);
  // gabled roof
  const roof = new THREE.Mesh(new THREE.ConeGeometry(Math.max(w, d) * 0.82, 2.2, 4),

const keys = {};
const mouse = new THREE.Vector2();
let firing = false;
const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
const touch = { moveId: null, mx: 0, my: 0, aimId: null, ax: 0, ay: 0 };
const aimPoint = new THREE.Vector3();
const raycaster = new THREE.Raycaster();
const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

addEventListener('keydown', e => {
  keys[e.code] = true;
  if (!GAME.running) return;
  if (e.code === 'KeyQ') castSkill(GAME.player, 'q');
  if (e.code === 'KeyE') castSkill(GAME.player, 'e');

  if (e.code === 'KeyC') useSeal(GAME.player);
  if (e.code === 'Space') { castSkill(GAME.player, 'q'); e.preventDefault(); }
});
addEventListener('keyup', e => { keys[e.code] = false; });
addEventListener('mousemove', e => { mouse.x = (e.clientX / innerWidth) * 2 - 1; mouse.y = -(e.clientY / innerHeight) * 2 + 1; });
renderer.domElement.addEventListener('mousedown', e => { if (!isTouch && e.button === 0) firing = true; });
addEventListener('mouseup', e => { if (e.button === 0) firing = false; });

addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });

// touch controls
const STICK_R = 58;
const moveStickEl = document.getElementById('move-stick'), aimStickEl = document.getElementById('aim-stick');
function showStick(el, x, y) { el.style.display = 'block'; el.style.left = x + 'px'; el.style.top = y + 'px'; setKnob(el, 0, 0); }
function setKnob(el, dx, dy) { const len = Math.hypot(dx, dy), cl = Math.min(STICK_R, len); const nx = len ? dx / len * cl : 0, ny = len ? dy / len * cl : 0; el.firstElementChild.style.transform = `translate(calc(-50% + ${nx}px), calc(-50% + ${ny}px))`; }
if (isTouch) {
  document.getElementById('touch').classList.remove('hidden');
  document.body.style.cursor = 'default';
  const bind = (id, fn) => document.getElementById(id).addEventListener('touchstart', e => { e.preventDefault(); fn(GAME.player); }, { passive: false });
  bind('tb-q', u => castSkill(u, 'q')); bind('tb-e', u => castSkill(u, 'e')); bind('tb-r', castNP); bind('tb-c', useSeal);
  addEventListener('touchstart', e => {
    for (const t of e.changedTouches) {
      if (t.target.closest('.tbtn') || t.target.closest('.screen') || t.target.closest('#tbtns')) continue;
      if (!GAME.running) continue;
      const left = t.clientX < innerWidth * 0.5;
      if (left && touch.moveId === null) { touch.moveId = t.identifier; touch.bx = t.clientX; touch.by = t.clientY; touch.mx = 0; touch.my = 0; showStick(moveStickEl, t.clientX, t.clientY); }
      else if (!left && touch.aimId === null) { touch.aimId = t.identifier; touch.abx = t.clientX; touch.aby = t.clientY; touch.ax = 0; touch.ay = 0; showStick(aimStickEl, t.clientX, t.clientY); }
    }
  }, { passive: false });
  addEventListener('touchmove', e => {
    for (const t of e.changedTouches) {
      if (t.identifier === touch.moveId) { const dx = t.clientX - touch.bx, dy = t.clientY - touch.by; touch.mx = dx / STICK_R; touch.my = dy / STICK_R; setKnob(moveStickEl, dx, dy); }
      else if (t.identifier === touch.aimId) { const dx = t.clientX - touch.abx, dy = t.clientY - touch.aby; touch.ax = dx; touch.ay = dy; setKnob(aimStickEl, dx, dy); }
    }
    if (touch.moveId !== null || touch.aimId !== null) e.preventDefault();
  }, { passive: false });
  const end = e => { for (const t of e.changedTouches) { if (t.identifier === touch.moveId) { touch.moveId = null; touch.mx = 0; touch.my = 0; moveStickEl.style.display = 'none'; } else if (t.identifier === touch.aimId) { touch.aimId = null; touch.ax = 0; touch.ay = 0; aimStickEl.style.display = 'none'; firing = false; } } };
  addEventListener('touchend', end); addEventListener('touchcancel', end);
}

// ===========================================================================
// ABILITIES
// ===========================================================================
function dirVec(u) { return new THREE.Vector3(Math.sin(u.facing), 0, Math.cos(u.facing)); }
function moveInputVec() {
  if (touch.moveId !== null) { const v = new THREE.Vector3(touch.mx, 0, touch.my); return v.lengthSq() > 0.05 ? v : new THREE.Vector3(); }
  const v = new THREE.Vector3();
  if (keys['KeyW']) v.z -= 1; if (keys['KeyS']) v.z += 1; if (keys['KeyA']) v.x -= 1; if (keys['KeyD']) v.x += 1;
  return v;
}
function nearestEnemy(u, maxDist, frontOnly) {
  let best = null, bd = maxDist * maxDist;
  const dir = dirVec(u);
  for (const o of units) {
    if (o === u || !o.alive) continue;
    const to = o.pos.clone().sub(u.pos); to.y = 0; const d2 = to.lengthSq();
    if (d2 >= bd) continue;
    if (frontOnly && to.normalize().dot(dir) < 0.3) continue;
    bd = d2; best = o;
  }
  return best;
}

function tryBasic(u) {
  if (u.fireT > 0 || u.dashT > 0 || u.npCharging > 0) return;
  const b = u.def.basic; u.fireT = b.cd * (u.buffT > 0 ? 0.7 : 1);
  if (b.kind === 'shot') { fireProjectile(u, dirVec(u), b.dmg, b.speed, u.color, b.knock); muzzle(u); }
  else meleeSwing(u, b.range, b.arc, b.dmg, b.knock);
}
function meleeSwing(u, range, arc, dmg, knock) {
  const dir = dirVec(u);
  for (const o of units) {
    if (o === u || !o.alive) continue;
    const to = o.pos.clone().sub(u.pos); to.y = 0; const d = to.length();
    if (d > range + CFG.unitRadius) continue;
    if (to.normalize().dot(dir) < Math.cos(arc / 2 + 0.2)) continue;
    damage(o, dmg, u, to.multiplyScalar(knock));
  }
  swingFx(u, range, arc);
}
function swingFx(u, range, arc) {
  const geo = new THREE.RingGeometry(0.6, range, 18, 1, -arc / 2 + Math.PI / 2, arc);
  const m = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: u.def.accent, transparent: true, opacity: 0.5, side: THREE.DoubleSide }));
  m.rotation.x = -Math.PI / 2; m.position.copy(u.pos).setY(1.2); m.rotation.z = -u.facing; addFx(m, 0.18);
}
function muzzle(u) { puff(u.pos.clone().setY(1.35).add(dirVec(u).multiplyScalar(1.2)), u.def.accent, 2, 4, 0.12); }

function castSkill(u, slot) {
  if (!u || !u.alive || u.dashT > 0 || u.npCharging > 0) return;
  const s = u.def[slot]; const cdKey = slot === 'q' ? 'cdQ' : 'cdE';
  if (u[cdKey] > 0) return;
  u[cdKey] = s.cd;
  if (s.kind === 'dashStrike') {
    let d = u.isPlayer ? moveInputVec() : dirVec(u); if (d.lengthSq() < 0.01) d = dirVec(u);
    u.dashDir.copy(d.normalize()); u.dashT = CFG.dash.time * 1.3; u.iframeT = CFG.dash.iframe; u.strikePending = { dmg: s.dmg, range: u.def.basic.range + 1.2 };
    puff(u.pos.clone().setY(1), 0xffffff, 6, 6, 0.14);
  } else if (s.kind === 'dodge') {
    let d = u.isPlayer ? moveInputVec() : dirVec(u).multiplyScalar(-1); if (d.lengthSq() < 0.01) d = dirVec(u).multiplyScalar(-1);
    u.dashDir.copy(d.normalize()); u.dashT = CFG.dash.time; u.iframeT = CFG.dash.iframe * 1.4;
    puff(u.pos.clone().setY(1), u.def.accent, 5, 6, 0.13);
  } else if (s.kind === 'buff') {
    u.buffT = s.dur; u.mat.emissiveIntensity = 0.5; puff(u.pos.clone().setY(1.4), u.def.accent, 16, 7, 0.2);
  } else if (s.kind === 'scatter') {
    const base = u.facing;
    for (let i = 0; i < s.count; i++) { const t = (i / (s.count - 1) - 0.5) * 2; const a = base + t * s.spread; fireProjectile(u, new THREE.Vector3(Math.sin(a), 0, Math.cos(a)), s.dmg, s.speed, u.color, 2); }
    muzzle(u);
  }
}

function npReady(u) { return u.np >= CFG.npMax; }
function castNP(u) {
  if (!u || !u.alive || !npReady(u) || u.npCharging > 0 || u.dashT > 0) return;
  const np = u.def.np;
  u.np = 0; u.npCharging = (np.charge || 0.35);
  u.npDir.copy(dirVec(u)); u.npKind = np.kind; u.npData = np;
  if (np.kind === 'pierce') { const t = nearestEnemy(u, np.range, false); u.npTarget = t; if (t) { const to = t.pos.clone().sub(u.pos); to.y = 0; u.facing = Math.atan2(to.x, to.z); u.npDir.copy(dirVec(u)); } }
  if (u.isPlayer) { addFeed(`<b>${u.name}</b> — 보구 「${np.name}」 해방!`); shake(0.6); }
  else addFeed(`${u.name} — 보구 「${np.name}」!`);
  // telegraph flash
  u.mat.emissiveIntensity = 1; u.mat.emissive.setHex(0xffffff);
}
function resolveNP(u) {
  const np = u.npData; const dir = u.npDir;
  if (np.kind === 'beam') {
    // Excalibur: forward rectangle
    for (const o of units) {
      if (o === u || !o.alive) continue;
      const to = o.pos.clone().sub(u.pos); to.y = 0;
      const fwd = to.dot(dir); if (fwd < 0 || fwd > np.range) continue;
      const lat = Math.abs(to.x * dir.z - to.z * dir.x); if (lat > np.width / 2 + CFG.unitRadius) continue;
      damage(o, np.dmg, u, dir.clone().multiplyScalar(8));
    }
    beamFx(u, dir, np.range, np.width, u.def.accent);
    shake(u.isPlayer ? 1.4 : 0.5);
  } else if (np.kind === 'pierce') {
    // Gáe Bolg: lunge to target, guaranteed massive hit
    const t = u.npTarget;
    if (t && t.alive) {
      const dest = t.pos.clone().sub(dir.clone().multiplyScalar(2));
      u.pos.copy(dest); damage(t, np.dmg, u, dir.clone().multiplyScalar(6), true);
      pierceFx(u, t);
    } else { puff(u.pos.clone().setY(1.4), u.color, 10, 6, 0.2); }
  } else if (np.kind === 'bladeRain') {
    // Unlimited Blade Works: zone in front
    const c = u.pos.clone().add(dir.clone().multiplyScalar(np.range)); c.y = 0;
    npZones.push({ x: c.x, z: c.z, r: np.radius, t: np.dur, owner: u, tick: 0.35, acc: 0, dmg: np.dmg });
    bladeRainFx(c, np.radius, np.dur);
  }
}

// NP visual fx
function beamFx(u, dir, range, width, color) {
  const geo = new THREE.BoxGeometry(width, 3, range);
  const m = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.85 }));
  m.position.copy(u.pos).setY(1.5).add(dir.clone().multiplyScalar(range / 2)); m.rotation.y = u.facing; addFx(m, 0.4);
  const m2 = new THREE.Mesh(new THREE.BoxGeometry(width * 1.8, 1.5, range), new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.4 }));
  m2.position.copy(m.position); m2.rotation.y = u.facing; addFx(m2, 0.5);
  puff(u.pos.clone().setY(1.4).add(dir.clone().multiplyScalar(2)), color, 14, 8, 0.2);
}
function pierceFx(u, t) {
  const a = u.pos.clone().setY(1.3), b = t.pos.clone().setY(1.3);
  const mid = a.clone().add(b).multiplyScalar(0.5); const len = a.distanceTo(b);
  const m = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, len, 6), new THREE.MeshBasicMaterial({ color: 0xff3030 }));
  m.position.copy(mid); m.lookAt(b); m.rotateX(Math.PI / 2); addFx(m, 0.3);
  puff(b, 0xff3030, 18, 8, 0.22); shake(u.isPlayer ? 1.0 : 0.4);
}
function bladeRainFx(c, r, dur) {
  for (let i = 0; i < 26; i++) {
    const a = Math.random() * Math.PI * 2, rr = Math.random() * r;
    const blade = new THREE.Mesh(new THREE.BoxGeometry(0.12, 1.6, 0.12), new THREE.MeshBasicMaterial({ color: 0xcfe0ff }));
    blade.position.set(c.x + Math.sin(a) * rr, 9 + Math.random() * 4, c.z + Math.cos(a) * rr); blade.rotation.z = Math.random(); addFx(blade, 0.9 + Math.random());
    blade.userData.fall = true;
  }
  const ring = new THREE.Mesh(new THREE.RingGeometry(r - 0.4, r, 40), new THREE.MeshBasicMaterial({ color: 0xff8a3a, transparent: true, opacity: 0.5, side: THREE.DoubleSide }));
  ring.rotation.x = -Math.PI / 2; ring.position.set(c.x, 0.1, c.z); addFx(ring, dur);
}

function useSeal(u) {
  if (!u || !u.alive || u.seals <= 0) return;
  u.seals--; u.cdQ = 0; u.cdE = 0; u.fireT = 0; u.np = Math.min(CFG.npMax, u.np + 40); u.sealBuffT = CFG.sealBuff;
  u.mat.emissive.setHex(0xff3030); u.mat.emissiveIntensity = 0.8;
  puff(u.pos.clone().setY(1.5), 0xff4d4d, 20, 7, 0.2);
  if (u.isPlayer) addFeed(`<b>영주</b> 사용 — 모든 스킬 재충전!`);
}
function gainNP(u, amt) { if (u.npCharging <= 0) u.np = Math.min(CFG.npMax, u.np + amt); }

// ===========================================================================
// DAMAGE
// ===========================================================================
function damage(target, amount, source, knock, guaranteed) {
  if (!target.alive || (target.iframeT > 0 && !guaranteed)) return;
  const crit = !guaranteed && Math.random() < 0.14;
  const dmg = crit ? amount * 1.6 : amount;
  target.hp -= dmg; target.lastHitT = 0; target.flash = 0.12;
  if (knock) target.knock.add(knock.clone().setY(0).normalize().multiplyScalar(Math.min(6, knock.length() || 2)));
  floatDamage(target.pos.clone().setY(2.7), dmg, crit);
  if (source) { gainNP(source, CFG.npPerHit); gainNP(target, CFG.npPerHit * 0.5); }
  if (target.isPlayer) shake(0.5);
  if (target.hp <= 0) kill(target, source);
}
function kill(target, source) {
  if (!target.alive) return; target.alive = false;
  puff(target.pos.clone().setY(1.3), target.color, 28, 8, 0.26);
  if (source && source !== target) {
    source.kills++; gainNP(source, CFG.npPerKill);
    if (source.isPlayer) addFeed(`<b>${source.name}</b> ▶ ${target.name} 탈락`);
    else if (target.isPlayer) addFeed(`${source.name} ▶ <b>${target.name}</b> 탈락`);
    else addFeed(`${source.name} ▶ ${target.name}`);
  } else addFeed(`${target.name} — 결계에 소멸`);
  if (target.isPlayer) shake(1.2);
}

// ===========================================================================
// AI
// ===========================================================================
function updateAI(u, dt) {
  const ai = u.ai; const gx = CFG.grail.x, gz = CFG.grail.z;
  const distG = Math.hypot(u.pos.x - gx, u.pos.z - gz);
  let move = new THREE.Vector3();
  if (distG > zoneRadius - 3) { move.set(gx - u.pos.x, 0, gz - u.pos.z).normalize(); u.facing = Math.atan2(move.x, move.z); return move; }
  const target = nearestEnemy(u, 30, false);
  if (target) {
    const to = target.pos.clone().sub(u.pos); to.y = 0; const dist = to.length();
    u.facing = Math.atan2(to.x, to.z); const dir = to.clone().normalize();
    const ideal = u.def.basic.kind === 'shot' ? 16 : 4;
    if (dist > ideal * 1.1) move.add(dir); else if (dist < ideal * 0.6) move.sub(dir);
    move.add(new THREE.Vector3(-dir.z, 0, dir.x).multiplyScalar(ai.strafe * 0.7));
    if (Math.random() < 0.01) ai.strafe *= -1;
    if (u.hp < u.maxHp * 0.25) move.copy(dir).multiplyScalar(-1);
    ai.react -= dt;
    if (dist < (u.def.basic.kind === 'shot' ? 20 : u.def.basic.range + 1) && ai.react <= 0) { tryBasic(u); ai.react = 0.25 + Math.random() * 0.3; }
    if (Math.random() < 0.004) castSkill(u, Math.random() < 0.5 ? 'q' : 'e');
    if (npReady(u) && dist < u.def.np.range && Math.random() < 0.04) castNP(u);
  } else {
    ai.wanderT -= dt;
    if (ai.wanderT <= 0) { const a = Math.random() * Math.PI * 2; ai.wander.set(Math.sin(a), 0, Math.cos(a)); ai.wanderT = 1 + Math.random() * 2; }
    move.add(ai.wander); u.facing = Math.atan2(ai.wander.x, ai.wander.z);
  }
  return move;
}

// ===========================================================================
// PHYSICS / STEP
// ===========================================================================
function collide(u) {
  for (const o of obstacles) {
    const dx = u.pos.x - o.x, dz = u.pos.z - o.z;
    const px = o.hw + CFG.unitRadius - Math.abs(dx), pz = o.hd + CFG.unitRadius - Math.abs(dz);
    if (px > 0 && pz > 0) { if (px < pz) u.pos.x += px * Math.sign(dx || 1); else u.pos.z += pz * Math.sign(dz || 1); }
  }
}
function stepUnit(u, dt) {
  if (!u.alive) return;
  u.prevPos.copy(u.pos);
  u.fireT = Math.max(0, u.fireT - dt); u.cdQ = Math.max(0, u.cdQ - dt); u.cdE = Math.max(0, u.cdE - dt);
  u.iframeT = Math.max(0, u.iframeT - dt); u.lastHitT += dt; u.flash = Math.max(0, u.flash - dt);
  if (u.buffT > 0) u.buffT -= dt; if (u.sealBuffT > 0) u.sealBuffT -= dt;
  if (u.lastHitT > CFG.regenDelay && u.hp < u.maxHp) u.hp = Math.min(u.maxHp, u.hp + CFG.regen * dt);
  if (u.npCharging <= 0) u.np = Math.min(CFG.npMax, u.np + CFG.npPerSec * dt);
  // NP charge → resolve
  if (u.npCharging > 0) { u.npCharging -= dt; if (u.npCharging <= 0) { resolveNP(u); u.mat.emissiveIntensity = 0; u.mat.emissive.setHex(u.color); } }

  let speed = u.def.speed * (u.buffT > 0 ? u.def.e.speed || 1.3 : 1) * (u.sealBuffT > 0 ? CFG.sealSpeed : 1);
  if (u.dashT > 0) {
    u.dashT -= dt; u.pos.addScaledVector(u.dashDir, (u.strikePending ? 14 : 11) * 0.016 * (dt / 0.016));
    if (u.dashT <= 0 && u.strikePending) { meleeSwing(u, u.strikePending.range, 1.4, u.strikePending.dmg, 3); u.strikePending = null; }
  } else if (u.npCharging <= 0) {
    let move = u.isPlayer ? moveInputVec() : updateAI(u, dt);
    if (u.isPlayer) {
      if (touch.aimId !== null) { const len = Math.hypot(touch.ax, touch.ay); if (len > 14) { u.facing = Math.atan2(touch.ax, touch.ay); firing = true; } else firing = false; }
      else if (!isTouch) { const toA = aimPoint.clone().sub(u.pos); toA.y = 0; if (toA.lengthSq() > 0.01) u.facing = Math.atan2(toA.x, toA.z); }
    }
    if (move.lengthSq() > 0.001) { move.normalize(); u.pos.addScaledVector(move, speed * dt); }
  }
  if (u.knock.lengthSq() > 0.001) { u.pos.addScaledVector(u.knock, dt); u.knock.multiplyScalar(Math.max(0, 1 - dt * 8)); }

  // bound to world (centered on grail)
  const dx = u.pos.x - CFG.grail.x, dz = u.pos.z - CFG.grail.z, d = Math.hypot(dx, dz);
  if (d > CFG.worldRadius) { u.pos.x = CFG.grail.x + dx / d * CFG.worldRadius; u.pos.z = CFG.grail.z + dz / d * CFG.worldRadius; }
  collide(u);
  if (d > zoneRadius) damage(u, CFG.zone.dps * dt, null, null);

  if (u.isPlayer && firing) tryBasic(u);

  u.grp.position.copy(u.pos); u.grp.rotation.y = u.facing;
  u.mat.emissive.setHex(u.flash > 0 ? 0xffffff : u.color);
  if (u.npCharging <= 0 && u.sealBuffT <= 0 && u.buffT <= 0) u.mat.emissiveIntensity = u.flash > 0 ? 0.9 : 0;
}

function stepProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i]; p.life -= dt; p.mesh.position.addScaledVector(p.dir, p.speed * dt);
    let dead = p.life <= 0;
    if (!dead) for (const o of obstacles) { if (Math.abs(p.mesh.position.x - o.x) < o.hw + 0.3 && Math.abs(p.mesh.position.z - o.z) < o.hd + 0.3 && p.mesh.position.y < o.h) { puff(p.mesh.position.clone(), p.color, 4, 4, 0.12); dead = true; break; } }
    if (!dead) for (const u of units) { if (u === p.owner || !u.alive) continue; const dx = p.mesh.position.x - u.pos.x, dz = p.mesh.position.z - u.pos.z; if (dx * dx + dz * dz < (CFG.unitRadius + CFG.proj.radius + 0.2) ** 2) { damage(u, p.dmg, p.owner, p.dir.clone().multiplyScalar(p.knock)); puff(p.mesh.position.clone().setY(1.4), p.color, 5, 4, 0.14); dead = true; break; } }
    const dd = Math.hypot(p.mesh.position.x - CFG.grail.x, p.mesh.position.z - CFG.grail.z);
    if (dd > CFG.worldRadius + 5) dead = true;
    if (dead) { scene.remove(p.mesh); projectiles.splice(i, 1); }
  }
}
function stepZones(dt) {
  for (let i = npZones.length - 1; i >= 0; i--) {
    const z = npZones[i]; z.t -= dt; z.acc += dt;
    if (z.acc >= z.tick) { z.acc = 0; for (const u of units) { if (u === z.owner || !u.alive) continue; if (Math.hypot(u.pos.x - z.x, u.pos.z - z.z) < z.r) damage(u, z.dmg, z.owner, null); } }
    if (z.t <= 0) npZones.splice(i, 1);
  }
}
function stepPuffs(dt) {
  for (let i = puffs.length - 1; i >= 0; i--) { const p = puffs[i]; p.life -= dt; p.mesh.position.addScaledVector(p.v, dt); p.v.y -= dt * 6; p.mesh.material.opacity = Math.max(0, p.life * 1.6); p.mesh.scale.multiplyScalar(1 - dt * 1.2); if (p.life <= 0) { scene.remove(p.mesh); puffs.splice(i, 1); } }
  for (let i = fx.length - 1; i >= 0; i--) { const f = fx[i]; f.life -= dt; const m = f.mesh; if (m.userData.fall) m.position.y -= dt * 22; m.material.opacity = Math.max(0, f.life / f.max); m.material.transparent = true; if (f.life <= 0) { scene.remove(m); fx.splice(i, 1); } }
}

let shakeAmt = 0;
function shake(a) { shakeAmt = Math.min(1.6, shakeAmt + a); }
function updateCamera(dt) {
  const p = GAME.player; const focus = p && p.alive ? p.pos : new THREE.Vector3(CFG.grail.x, 0, CFG.grail.z);
  camera.position.lerp(focus.clone().add(CAM_OFF), 1 - Math.exp(-dt * 6));
  if (shakeAmt > 0) { camera.position.x += (Math.random() - 0.5) * shakeAmt; camera.position.y += (Math.random() - 0.5) * shakeAmt; shakeAmt = Math.max(0, shakeAmt - dt * 3); }
  camera.lookAt(focus);
  moon.target.position.copy(focus); moon.position.copy(focus).add(new THREE.Vector3(-40, 60, -30));
}

const elAlive = document.getElementById('alive'), elZone = document.getElementById('zonetxt'), elFeed = document.getElementById('feed');
const elHpFill = document.getElementById('hpbigfill'), elHpTxt = document.getElementById('hpbigtxt');
const elNpFill = document.getElementById('npfill'), elNpWrap = document.getElementById('npwrap');
const elVignette = document.getElementById('vignette'), elSvName = document.getElementById('svname');
const sealEls = [...document.querySelectorAll('#seals .seal')];
const cdEls = { q: document.querySelector('#sk-q .cd'), e: document.querySelector('#sk-e .cd'), r: document.querySelector('#sk-r .cd') };
const skNm = { q: document.querySelector('#sk-q .nm'), e: document.querySelector('#sk-e .nm'), r: document.querySelector('#sk-r .nm') };
const mm = document.getElementById('minimap').getContext('2d');

function addFeed(html) { const r = document.createElement('div'); r.className = 'feedrow'; r.innerHTML = html; elFeed.prepend(r); while (elFeed.children.length > 6) elFeed.lastChild.remove(); setTimeout(() => r.remove(), 5000); }

const tmpV = new THREE.Vector3();
function w2s(pos) { tmpV.copy(pos).project(camera); return { x: (tmpV.x * 0.5 + 0.5) * innerWidth, y: (-tmpV.y * 0.5 + 0.5) * innerHeight, vis: tmpV.z < 1 }; }

function updateHUD(dt) {
  const p = GAME.player; const alive = units.filter(u => u.alive).length;
  elAlive.innerHTML = `${alive} <small>서번트</small>`;
  if (GAME.zoneT < CFG.zone.grace) elZone.textContent = `결계 수축까지 ${Math.ceil(CFG.zone.grace - GAME.zoneT)}s`;
  else elZone.textContent = `⚠ 성배 결계 수축 — 반경 ${zoneRadius.toFixed(0)}`;
  if (p) {
    elHpFill.style.width = Math.max(0, p.hp / p.maxHp * 100) + '%';
    elHpTxt.textContent = `${Math.max(0, Math.ceil(p.hp))} / ${p.maxHp}`;
    elNpFill.style.width = (p.np / CFG.npMax * 100) + '%'; elNpWrap.classList.toggle('ready', npReady(p));
    cdEls.q.style.transform = `scaleY(${p.cdQ / (p.def.q.cd)})`; cdEls.e.style.transform = `scaleY(${p.cdE / (p.def.e.cd)})`;
    cdEls.r.style.transform = `scaleY(${npReady(p) ? 0 : 1 - p.np / CFG.npMax})`;
    sealEls.forEach((s, i) => s.classList.toggle('spent', i >= p.seals));
    const low = p.alive ? Math.max(0, 1 - p.hp / (p.maxHp * 0.4)) : 0.5;
    elVignette.style.boxShadow = `inset 0 0 220px rgba(150,12,12,${low * 0.85})`;
  }
  for (const u of units) {
    if (!u.plate) continue;
    if (!u.alive) { u.plate.wrap.style.display = 'none'; u.plate.label.style.display = 'none'; continue; }
    const s = w2s(tmpV.copy(u.pos).setY(3.0)), sl = w2s(tmpV.copy(u.pos).setY(3.6));
    if (s.vis) { u.plate.wrap.style.display = ''; u.plate.label.style.display = ''; u.plate.wrap.style.left = s.x + 'px'; u.plate.wrap.style.top = s.y + 'px'; u.plate.fill.style.width = Math.max(0, u.hp / u.maxHp * 100) + '%'; u.plate.label.style.left = sl.x + 'px'; u.plate.label.style.top = sl.y + 'px'; }
    else { u.plate.wrap.style.display = 'none'; u.plate.label.style.display = 'none'; }
  }
  for (let i = floaters.length - 1; i >= 0; i--) { const f = floaters[i]; f.t += dt; const s = w2s(tmpV.copy(f.pos).setY(2.7 + f.t * 1.6)); f.el.style.left = (s.x + f.ox) + 'px'; f.el.style.top = s.y + 'px'; f.el.style.opacity = Math.max(0, 1 - f.t / f.life); if (f.t >= f.life) { f.el.remove(); floaters.splice(i, 1); } }
  drawMinimap();
}

function drawMinimap() {
  const W = 140, cx = W / 2, cy = W / 2, sc = (W / 2 - 6) / CFG.worldRadius;
  mm.clearRect(0, 0, W, W);
  // districts hint
  mm.fillStyle = 'rgba(40,46,70,0.5)'; mm.fillRect(0, 0, W, cy);          // north = Shinto
  mm.fillStyle = 'rgba(30,40,28,0.5)'; mm.fillRect(0, cy, W, cy);          // south = Miyama
  mm.fillStyle = 'rgba(20,40,80,0.7)'; mm.fillRect(0, cy - 5, W, 10);      // river
  // zone circle (centered on grail)
  const ox = cx + CFG.grail.x * sc, oy = cy + CFG.grail.z * sc;
  mm.beginPath(); mm.arc(ox, oy, zoneRadius * sc, 0, 7); mm.strokeStyle = 'rgba(176,91,255,0.9)'; mm.lineWidth = 2; mm.stroke();
  // grail
  mm.fillStyle = '#ffd27a'; mm.beginPath(); mm.arc(ox, oy, 3, 0, 7); mm.fill();
  for (const u of units) { if (!u.alive) continue; mm.beginPath(); mm.arc(cx + u.pos.x * sc, cy + u.pos.z * sc, u.isPlayer ? 4 : 2.6, 0, 7); mm.fillStyle = '#' + u.color.toString(16).padStart(6, '0'); mm.fill(); if (u.isPlayer) { mm.strokeStyle = '#fff'; mm.lineWidth = 1.5; mm.stroke(); } }
}

// region announce when player crosses river

  const p = GAME.player; if (!p || !p.alive) return;
  const side = p.pos.z < 0 ? '신토 (新都)' : (p.pos.z > 38 ? '류도지 (柳洞寺)' : '심산정 (深山町)');
  if (side !== lastSide) { lastSide = side; const el = document.getElementById('region'); el.textContent = side; el.style.opacity = '1'; clearTimeout(regionWatch._t); regionWatch._t = setTimeout(() => el.style.opacity = '0', 1400); }
}

const GAME = { running: false, player: null, zoneT: 0, ended: false, choice: 'saber' };

function startMatch() {
  for (const u of units) { scene.remove(u.grp); if (u.plate) { u.plate.wrap.remove(); u.plate.label.remove(); } }
  units.length = 0;
  for (const p of projectiles) scene.remove(p.mesh); projectiles.length = 0;
  for (const p of puffs) scene.remove(p.mesh); puffs.length = 0;
  for (const f of fx) scene.remove(f.mesh); fx.length = 0; npZones.length = 0;
  floaters.forEach(f => f.el.remove()); floaters.length = 0; elFeed.innerHTML = '';
  zoneRadius = CFG.worldRadius; barrier.scale.set(1, 1, 1); GAME.zoneT = 0; GAME.ended = false; lastSide = null;
  spawnMatch();
  const d = SERVANTS[GAME.choice];
  elSvName.textContent = `— ${d.name} · ${d.hero} —`;
  skNm.q.textContent = d.q.name; skNm.e.textContent = d.e.name; skNm.r.textContent = d.np.name;
  document.getElementById('sk-r').querySelector('.nm').textContent = d.np.name;
  GAME.running = true;
}
function endMatch(victory) {
  GAME.running = false; GAME.ended = true; const p = GAME.player;
  const place = victory ? 1 : units.filter(u => u.alive).length + 1;
  document.getElementById('resulttitle').textContent = victory ? '최후의 서번트' : '탈락';
  document.getElementById('resulttitle').style.color = victory ? '#ffd27a' : '#ff6b5f';
  document.getElementById('result').textContent = victory ? '🏆 성배를 손에 넣었다' : '성배전쟁에서 패배';
  document.getElementById('killcount').textContent = p ? p.kills : 0;
  document.getElementById('placecount').textContent = '#' + place;
  document.getElementById('resultscreen').classList.remove('hidden');
}

const clock = new THREE.Clock(); let acc = 0; const FIXED = 1 / 60;
function loop() {
  requestAnimationFrame(loop);
  const dt = Math.min(0.05, clock.getDelta());
  if (grailMesh) grailMesh.rotation.y += dt;
  if (GAME.running) {
    acc += dt;
    while (acc >= FIXED) {
      GAME.zoneT += FIXED;
      if (GAME.zoneT > CFG.zone.grace) { const t = Math.min(1, (GAME.zoneT - CFG.zone.grace) / CFG.zone.shrinkTime); zoneRadius = CFG.worldRadius + (CFG.zone.minRadius - CFG.worldRadius) * t; barrier.scale.set(zoneRadius / CFG.worldRadius, 1, zoneRadius / CFG.worldRadius); }
      updateAim();
      for (const u of units) stepUnit(u, FIXED);
      stepProjectiles(FIXED); stepZones(FIXED); stepPuffs(FIXED);
      acc -= FIXED;
      if (!GAME.ended) { const alive = units.filter(u => u.alive); if (!GAME.player.alive) endMatch(false); else if (alive.length <= 1) endMatch(true); }
    }
    regionWatch();
  } else stepPuffs(dt);
  updateCamera(dt); updateHUD(dt); renderer.render(scene, camera);
}

  const c = document.createElement('div'); c.className = 'card'; c.dataset.k = k;
  const hex = '#' + d.color.toString(16).padStart(6, '0');
  c.innerHTML = `<div class="cls"><span class="swatch" style="background:${hex}"></span>${d.cls}</div>
    <div class="hn">${d.name}</div><div class="role">${d.hero}<br>${d.role}</div>
    <div class="kit">Q ${d.q.name} · E ${d.e.name}</div>
    <div class="np">★ 보구 — ${d.np.name}</div>`;
  c.addEventListener('click', () => {
    GAME.choice = k; [...cardsEl.children].forEach(x => x.classList.toggle('sel', x === c));
    const b = document.getElementById('startbtn'); b.disabled = false; b.textContent = `${d.name}로 소환`;
  });
  cardsEl.appendChild(c);
});
document.getElementById('startbtn').addEventListener('click', () => { if (document.getElementById('startbtn').disabled) return; document.getElementById('startscreen').classList.add('hidden'); startMatch(); });
document.getElementById('againbtn').addEventListener('click', () => { document.getElementById('resultscreen').classList.add('hidden'); document.getElementById('startscreen').classList.remove('hidden'); });
</script>
</body>
</html>
