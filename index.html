<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>후유키 시 산책 — Fuyuki City Walk</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1026; }
  body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif; }
  #app { width: 100%; height: 100%; }
  canvas { display: block; }

  /* cinematic vignette */
  #vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(10, 5, 20, 0.45) 100%);
  }

  /* title screen */
  #title {
    position: fixed; inset: 0; z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: linear-gradient(180deg, rgba(20,12,40,0.92) 0%, rgba(60,25,50,0.88) 60%, rgba(120,55,40,0.85) 100%);
    color: #f5e8d8; text-align: center; cursor: pointer;
    transition: opacity 0.8s ease;
  }
  #title.hidden { opacity: 0; pointer-events: none; }
  #title h1 { font-size: 52px; letter-spacing: 14px; font-weight: 700; text-shadow: 0 0 30px rgba(255,150,80,0.5); margin-bottom: 6px; }
  #title h2 { font-size: 16px; letter-spacing: 6px; font-weight: 300; color: #e8b88a; margin-bottom: 40px; }
  #title .controls {
    background: rgba(0,0,0,0.35); border: 1px solid rgba(255,200,140,0.25); border-radius: 12px;
    padding: 22px 36px; font-size: 14px; line-height: 2.0; color: #e8dcc8; text-align: left;
  }
  #title .controls b { color: #ffc890; font-weight: 600; display: inline-block; min-width: 110px; }
  #title .start { margin-top: 36px; font-size: 17px; letter-spacing: 4px; color: #ffd9a8; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* location label */
  #location {
    position: fixed; top: 42px; left: 50%; transform: translateX(-50%); z-index: 10;
    color: #fff2dd; text-align: center; pointer-events: none;
    opacity: 0; transition: opacity 1.2s ease;
    text-shadow: 0 2px 14px rgba(0,0,0,0.8);
  }
  #location.visible { opacity: 1; }
  #location .kr { font-size: 30px; letter-spacing: 10px; font-weight: 600; }
  #location .en { font-size: 12px; letter-spacing: 5px; color: #e8b88a; margin-top: 6px; text-transform: uppercase; }
  #location .bar { width: 60px; height: 1px; background: rgba(255,200,140,0.6); margin: 10px auto 0; }

  /* bottom hint */
  #hint {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); z-index: 10;
    color: rgba(245,230,210,0.55); font-size: 12px; letter-spacing: 1px; pointer-events: none;
    text-shadow: 0 1px 6px rgba(0,0,0,0.8); white-space: nowrap;
  }

  /* teleport flash */
  #flash {
    position: fixed; inset: 0; z-index: 15; pointer-events: none;
    background: #fff8ec; opacity: 0; transition: opacity 0.7s ease;
  }
  #flash.on { opacity: 0.9; transition: opacity 0.05s ease; }
</style>
</head>
<body>
<div id="app"></div>
<div id="vignette"></div>
<div id="flash"></div>

<div id="location">
  <div class="kr"></div>
  <div class="en"></div>
  <div class="bar"></div>
</div>

<div id="hint">WASD 이동 · Shift 달리기 · Space 점프 · 마우스 드래그 시점 · 휠 줌 · 1~7 장소 이동</div>

<div id="title">
  <h1>후유키 시</h1>
  <h2>FUYUKI CITY — Fate/stay night Walk</h2>
  <div class="controls">
    <div><b>W A S D / 방향키</b> 걷기</div>
    <div><b>Shift</b> 달리기</div>
    <div><b>Space</b> 점프</div>
    <div><b>마우스 드래그</b> 시점 회전 · <b>휠</b> 줌</div>
    <div style="margin-top:10px; border-top:1px solid rgba(255,200,140,0.2); padding-top:10px;">
      <b>1</b> 후유키 대교 &nbsp; <b>2</b> 에미야 저택 &nbsp; <b>3</b> 토오사카 저택 &nbsp; <b>4</b> 류도사<br>
      <b>5</b> 신토 시가지 &nbsp; <b>6</b> 후유키 교회 &nbsp; <b>7</b> 아인츠베른 성
    </div>
  </div>
  <div class="start">― 클릭해서 산책 시작 ―</div>
</div>

<script>
// load guard: if the game script is corrupted or the graphics API is
// unavailable, surface the reason on the title screen instead of dying silently
(function () {
  var shown = false;
  function show(msg) {
    if (shown) return;
    var el = document.querySelector('#title .start');
    if (el) { shown = true; el.textContent = msg; el.style.color = '#ff9090'; el.style.animation = 'none'; }
  }
  window.addEventListener('error', function (e) {
    var m = e.message || '';
    if (m.indexOf('WebGL') !== -1) {
      show('이 브라우저에서 3D 그래픽(WebGL)을 사용할 수 없어요. 크롬 설정 > 시스템 > "그래픽 가속 사용"을 켜거나 다른 브라우저로 열어보세요.');
    } else {
      show('오류가 발생했어요: ' + (m || '알 수 없는 오류'));
    }
  });
  window.setTimeout(function () {
    if (!window.__fuyukiLoaded) {
      show('게임 코드를 불러오지 못했어요. 파일이 끝까지 다운로드되지 않았을 수 있으니 다시 다운로드해 주세요 (정상 크기: 약 0.5MB).');
    }
  }, 3000);
})();
</script>
